<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght=700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --text-color: #ffffff; --status-color: #00f2ff; }
        body { font-family: 'Oswald', sans-serif; margin: 0; background: #00FF00; overflow: hidden; width: 1920px; height: 1080px; user-select: none; }
        
        /* THE MASTER BOARD BOX */
        #board { 
            position: absolute; 
            right: 40px; 
            bottom: 40px; 
            width: 320px; 
            height: 730px; 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        #rows-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }
        
        /* INDIVIDUAL DRAGGABLE COLUMNS */
        .drag-col {
            position: absolute;
            height: 100%;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* EDITOR ACTIVE CONTROLS */
        .editor-active .drag-col {
            border: 1px dashed rgba(0, 242, 255, 0.4);
            background: rgba(0, 242, 255, 0.03);
            cursor: move;
        }
        .editor-active .drag-col::after {
            content: '↔';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 20px;
            background: var(--cyan);
            cursor: ew-resize;
            font-size: 11px;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* LIVE DYNAMIC CELLS */
        .cell-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            color: var(--text-color);
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            text-shadow: 1px 1px 2px #000;
            box-sizing: border-box;
        }
        .cell-item.eliminated { opacity: 0.25; filter: grayscale(1); }
        
        .name-col-item { justify-content: flex-start; padding-left: 5px; text-transform: uppercase; overflow: hidden; }
        .logo-col-item img { width: 22px; height: 22px; object-fit: contain; }

        /* STATUS ALIVE BARS */
        .status-col-item { display: flex; gap: 3px; justify-content: center; }
        .bar { width: 4px; height: 14px; background: var(--status-color); box-shadow: 0 0 4px var(--status-color); }
        .bar.dead { background: #444; box-shadow: none; opacity: 0.2; }

        /* VISUAL CONTROLS OVERLAY FOR HEIGHT & TOP OFFSET */
        #editor-ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(17, 22, 26, 0.95);
            border: 2px solid var(--cyan);
            padding: 15px;
            font-family: 'Oswald', sans-serif;
            z-index: 9999;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        #editor-ui-panel label { font-size: 11px; color: var(--cyan); letter-spacing: 1px; text-transform: uppercase; }
        #editor-ui-panel input[type="range"] { width: 200px; cursor: pointer; accent-color: var(--cyan); }
        #editor-toggle-btn {
            background: var(--cyan);
            color: black;
            border: none;
            padding: 8px;
            font-family: 'Oswald', sans-serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
        }
        
        /* PREDICTION PANEL & ELIM POPUP */
        #prediction-panel { position: absolute; bottom: 40px; right: 40px; display: none; flex-direction: column; gap: 8px; }
        #prediction-panel.show { display: flex; }
        .pred-card { width: 320px; height: 65px; background-size: 100% 100%; background-repeat: no-repeat; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; color: white; }
        #elim-popup { position: fixed; top: -200px; left: 50%; transform: translateX(-50%) scale(0.9); display: flex; width: 340px; height: 95px; background-size: 100% 100%; background-repeat: no-repeat; color: white; opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #elim-popup.show { top: 40px; opacity: 1; transform: translateX(-50%) scale(1); box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
    </style>
</head>
<body>

    <div id="editor-ui-panel">
        <button id="editor-toggle-btn" onclick="toggleEditorMode()">🛠️ OPEN LAYOUT EDITOR</button>
        <div id="sliders-section" style="display: none; flex-direction: column; gap: 10px;">
            <div>
                <label id="lbl-top">Header Padding (Top Shift): 38px</label><br>
                <input type="range" id="slide-top" min="0" max="150" value="38" oninput="changeVerticals()">
            </div>
            <div>
                <label id="lbl-height">Row Box Height: 32px</label><br>
                <input type="range" id="slide-height" min="15" max="60" value="32" oninput="changeVerticals()">
            </div>
            <div>
                <label id="lbl-gap">Row Spacing (Gap): 4px</label><br>
                <input type="range" id="slide-gap" min="0" max="25" value="4" oninput="changeVerticals()">
            </div>
        </div>
    </div>

    <div id="elim-popup">
        <div style="width:100px; display:flex; align-items:center; justify-content:center;"><img id="pop-logo" style="width:65px; object-fit:contain;"></div>
        <div style="flex:1; padding:15px; display:flex; flex-direction:column; justify-content:center;"><p id="pop-name" style="font-size:26px; margin:0; text-transform:uppercase; font-weight:900; line-height:1;"></p><p style="color:var(--cyan); margin:0; font-size:12px; letter-spacing:2px; font-weight:bold;">ELIMINATED</p></div>
        <div style="width:90px; display:flex; align-items:center; justify-content:center; font-size:35px; color:var(--cyan); font-weight:900;" id="pop-fin">0</div>
    </div>

    <div id="prediction-panel"></div>

    <div id="board">
        <div id="rows-wrapper">
            <div id="col-rank" class="drag-col"></div>
            <div id="col-logo" class="drag-col"></div>
            <div id="col-name" class="drag-col"></div>
            <div id="col-status" class="drag-col"></div>
            <div id="col-fin" class="drag-col"></div>
            <div id="col-pts" class="drag-col"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SYNC_PATH = 'TournamentData/LiveSession';

        let currentElimId = ""; let cachedTeamsData = []; 
        let isEditorMode = false;

        // Load saved settings or use defaults
        let layoutSettings = JSON.parse(localStorage.getItem('overlay_layout_positions')) || {
            'col-rank':   { left: 10,  width: 30 },
            'col-logo':   { left: 45,  width: 30 },
            'col-name':   { left: 80,  width: 90 },
            'col-status': { left: 175, width: 60 },
            'col-fin':    { left: 240, width: 35 },
            'col-pts':    { left: 280, width: 35 }
        };

        let verticalSettings = JSON.parse(localStorage.getItem('overlay_vertical_settings')) || {
            topShift: 38,
            rowHeight: 32,
            rowGap: 4
        };

        function applyLayoutStyles() {
            Object.keys(layoutSettings).forEach(id => {
                const el = document.getElementById(id);
                if(el) {
                    el.style.left = layoutSettings[id].left + 'px';
                    el.style.width = layoutSettings[id].width + 'px';
                    el.style.paddingTop = verticalSettings.topShift + 'px';
                    el.style.gap = verticalSettings.rowGap + 'px';
                }
            });

            const cells = document.querySelectorAll('.cell-item');
            cells.forEach(c => {
                c.style.height = verticalSettings.rowHeight + 'px';
            });
        }

        function initSliders() {
            document.getElementById('slide-top').value = verticalSettings.topShift;
            document.getElementById('slide-height').value = verticalSettings.rowHeight;
            document.getElementById('slide-gap').value = verticalSettings.rowGap;
            
            document.getElementById('lbl-top').innerText = `Header Padding (Top Shift): ${verticalSettings.topShift}px`;
            document.getElementById('lbl-height').innerText = `Row Box Height: ${verticalSettings.rowHeight}px`;
            document.getElementById('lbl-gap').innerText = `Row Spacing (Gap): ${verticalSettings.rowGap}px`;
        }

        function changeVerticals() {
            verticalSettings.topShift = parseInt(document.getElementById('slide-top').value);
            verticalSettings.rowHeight = parseInt(document.getElementById('slide-height').value);
            verticalSettings.rowGap = parseInt(document.getElementById('slide-gap').value);

            document.getElementById('lbl-top').innerText = `Header Padding (Top Shift): ${verticalSettings.topShift}px`;
            document.getElementById('lbl-height').innerText = `Row Box Height: ${verticalSettings.rowHeight}px`;
            document.getElementById('lbl-gap').innerText = `Row Spacing (Gap): ${verticalSettings.rowGap}px`;

            applyLayoutStyles();
        }

        db.ref(SYNC_PATH).on('value', (snap) => {
            const data = snap.val(); if(!data) return;
            const cfg = data.config || {};
            Object.entries(cfg).forEach(([p,v]) => { document.documentElement.style.setProperty('--' + p, v); });
            
            if(cfg['gfx-full-table']) document.getElementById('board').style.backgroundImage = `url('${cfg['gfx-full-table']}')`;
            if(cfg['gfx-elim']) document.getElementById('elim-popup').style.backgroundImage = `url('${cfg['gfx-elim']}')`;

            if(data.lastEliminated && data.lastEliminated.id !== currentElimId) {
                currentElimId = data.lastEliminated.id;
                document.getElementById('pop-logo').src = data.lastEliminated.logo;
                document.getElementById('pop-name').innerText = data.lastEliminated.name;
                document.getElementById('pop-fin').innerText = data.lastEliminated.finishes;
                const p = document.getElementById('elim-popup'); p.classList.add('show'); 
                setTimeout(() => p.classList.remove('show'), 4000);
            }
            
            cachedTeamsData = data.teams || [];
            render(cachedTeamsData, cfg);
        });

        function render(teams, cfg) {
            const board = document.getElementById('board');
            const pPanel = document.getElementById('prediction-panel');
            
            // FIX: filter lagane se pehle check kiya ki data exist karta hai ya nahi
            const alive = teams.filter(t => t && t.alive && t.alive.some(a => a === 1));

            document.getElementById('col-rank').innerHTML = '';
            document.getElementById('col-logo').innerHTML = '';
            document.getElementById('col-name').innerHTML = '';
            document.getElementById('col-status').innerHTML = '';
            document.getElementById('col-fin').innerHTML = '';
            document.getElementById('col-pts').innerHTML = '';

            if (alive.length >= 2 && alive.length <= 5 && !isEditorMode) {
                pPanel.classList.add('show'); board.style.display="none"; pPanel.innerHTML="";
                let totalS = alive.reduce((a,c) => a + (((parseInt(c.totalFin)||0)+(parseInt(c.totalPos)||0)) + c.alive.filter(x=>x==1).length * 3), 0) || 1;
                
                alive.forEach((t) => {
                    let teamTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let winPerc = Math.round((((teamTotal + t.alive.filter(x=>x==1).length * 3)/totalS)*100));
                    pPanel.innerHTML += `<div class="pred-card" style="background-image: url('${cfg['gfx-pred']||''}');">
                        <img src="${t.logo}" style="width:32px; height:32px; object-fit:contain; margin-right:10px;">
                        <div style="flex:1;"><div style="font-size:13px; font-weight:bold;">${t.name}</div><div style="font-size:9px; color:#ccc;">${teamTotal} TOTAL PTS</div></div>
                        <div style="color:var(--cyan); font-size:20px; font-weight:900;">${winPerc}%</div>
                    </div>`;
                });
            } else {
                pPanel.classList.remove('show'); board.style.display="flex";
                const sortedTeams = [...teams].sort((a,b)=> ((parseInt(b.totalFin)||0)+(parseInt(b.totalPos)||0)) - ((parseInt(a.totalFin)||0)+(parseInt(a.totalPos)||0)) );
                
                sortedTeams.forEach((t, i) => {
                    let overallTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let statusClass = (t.alive && t.alive.every(a=>a==0)) ? 'eliminated' : '';

                    document.getElementById('col-rank').innerHTML += `<div class="cell-item ${statusClass}">${i+1}</div>`;
                    document.getElementById('col-logo').innerHTML += `<div class="cell-item logo-col-item ${statusClass}"><img src="${t.logo || ''}"></div>`;
                    document.getElementById('col-name').innerHTML += `<div class="cell-item name-col-item ${statusClass}">${t.name || 'TEAM'}</div>`;
                    document.getElementById('col-status').innerHTML += `<div class="cell-item status-col-item ${statusClass}">${t.alive ? t.alive.map(a => `<div class="bar ${a?'':'dead'}"></div>`).join('')} : ''</div>`;
                    document.getElementById('col-fin').innerHTML += `<div class="cell-item ${statusClass}">${t.fin || 0}</div>`;
                    document.getElementById('col-pts').innerHTML += `<div class="cell-item ${statusClass}" style="color:var(--cyan); font-weight:900;">${overallTotal}</div>`;
                });
            }
            initSliders();
            applyLayoutStyles();
        }

        function toggleEditorMode() {
            isEditorMode = !isEditorMode;
            const btn = document.getElementById('editor-toggle-btn');
            const sliders = document.getElementById('sliders-section');
            if(isEditorMode) {
                document.body.classList.add('editor-active');
                sliders.style.display = "flex";
                btn.innerText = "💾 SAVE & LOCK POSITION";
            } else {
                document.body.classList.remove('editor-active');
                sliders.style.display = "none";
                btn.innerText = "🛠️ OPEN LAYOUT EDITOR";
                localStorage.setItem('overlay_layout_positions', JSON.stringify(layoutSettings));
                localStorage.setItem('overlay_vertical_settings', JSON.stringify(verticalSettings));
            }
            render(cachedTeamsData, {});
        }

        /* MOUSE DRAG ENGINE */
        let activeTarget = null; let startX = 0; let startLeft = 0; let startWidth = 0; let isResizing = false;

        document.addEventListener('mousedown', (e) => {
            if(!isEditorMode) return;
            const col = e.target.closest('.drag-col');
            if(!col) return;

            activeTarget = col;
            startX = e.clientX;
            startLeft = layoutSettings[col.id].left;
            startWidth = layoutSettings[col.id].width;

            const rect = col.getBoundingClientRect();
            if (e.clientX >= rect.right - 12) { isResizing = true; } else { isResizing = false; }
        });

        document.addEventListener('mousemove', (e) => {
            if(!isEditorMode || !activeTarget) return;
            let diffX = e.clientX - startX;
            if(isResizing) {
                layoutSettings[activeTarget.id].width = Math.max(15, startWidth + diffX);
            } else {
                layoutSettings[activeTarget.id].left = startLeft + diffX;
            }
            applyLayoutStyles();
        });

        document.addEventListener('mouseup', () => { activeTarget = null; isResizing = false; });
    </script>
</body>
</html>
