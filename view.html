<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #ffcc00; 
            --dark-blue: #12193b; 
            --row-bg: #1a2245; 
            --text-color: #ffffff; 
            --status-bg: #252c33;
            --top-row-bg: #15191d;
            --elim-bg: #d03000;
        }

        body { 
            font-family: 'Oswald', sans-serif; 
            margin: 0; 
            background: #00FF00; 
            overflow: hidden; 
            width: 1920px; 
            height: 1080px; 
        }
        
        /* LEADERBOARD BOARD RIGHT SIDE */
        #board { 
            position: absolute; 
            right: 40px; 
            bottom: 40px; 
            background: var(--dark-blue); 
            padding: 8px; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        .header-row, .team-row { display: grid; grid-template-columns: 25px 30px 55px 35px 30px 30px; align-items: center; gap: 2px; color: var(--text-color); }
        .header-row { font-size: 10px; color: var(--cyan); background: var(--top-row-bg); border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 4px; text-align: center; }
        
        .team-row { background: var(--row-bg); height: 32px; margin-bottom: 2px; transition: all 0.3s ease; }
        .team-row.eliminated { opacity: 0.4; filter: grayscale(1); }
        .logo-col { width: 22px; height: 22px; background: transparent; border-radius: 2px; margin: auto; display: flex; align-items: center; justify-content: center; }
        .logo-col img { width: 100%; height: 100%; object-fit: contain; }
        .name-col { padding-left: 5px; font-weight: bold; font-size: 13px; overflow: hidden; white-space: nowrap; text-transform: uppercase; }
        
        /* STATUS BARS PULSE ANIMATION */
        .status-col { display: flex; gap: 3px; justify-content: start; padding-left: 5px; background: var(--status-bg); height: 100%; align-items: center; }
        .bar { 
            width: 4px; 
            height: 16px; 
            background: var(--cyan); 
            box-shadow: 0 0 8px var(--cyan); 
            animation: pulseGlow 1.4s infinite ease-in-out;
        }
        .bar.dead { background: #444; box-shadow: none; opacity: 0.3; animation: none; }
        .total-box { background: var(--cyan); color: #000; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        
        @keyframes pulseGlow {
            0% { transform: scaleY(1); opacity: 0.8; }
            50% { transform: scaleY(1.15); opacity: 1; box-shadow: 0 0 10px var(--cyan); }
            100% { transform: scaleY(1); opacity: 0.8; }
        }

        /* =========================================================
           EXACT VIDEO POPUP ANIMATION (PAGE UNFOLD / FOLD EFFECT)
           ========================================================= */
        #elim-banner { 
            position: absolute; 
            left: 80px; 
            bottom: 240px; 
            display: none; 
            z-index: 1000; 
            perspective: 1000px;
        }
        
        #elim-banner.show { 
            display: block; 
        }
        
        #elim-banner.show .elim-card {
            animation: exactVideoUnfold 0.55s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        
        #elim-banner.hide-anim .elim-card {
            animation: exactVideoFold 0.35s ease-in forwards;
        }

        .elim-card { 
            display: flex; 
            align-items: stretch; 
            position: relative; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7);
            transform-origin: left center;
            opacity: 0;
            background: #ffffff;
        }

        /* Rank Tag Badge (#5) */
        .elim-rank-tag {
            position: absolute;
            top: -16px;
            left: -16px;
            background: #ffaa00;
            color: #000000;
            font-family: 'Oswald', sans-serif;
            font-size: 26px;
            font-weight: 800;
            padding: 2px 10px;
            line-height: 1;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            z-index: 20;
        }

        /* Logo Container */
        .elim-logo-container {
            width: 80px;
            height: 80px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            box-sizing: border-box;
            z-index: 10;
        }

        .elim-logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Main Red Box & Yellow Bar Stack */
        .elim-right-content {
            display: flex;
            flex-direction: column;
            width: 360px;
        }

        .elim-main-banner {
            background: linear-gradient(180deg, #e63900 0%, #a32200 100%);
            height: 50px;
            display: flex;
            align-items: center;
            padding-left: 18px;
        }

        .elim-main-banner span {
            font-family: 'Oswald', sans-serif;
            font-size: 38px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1;
        }

        .elim-stats-bar {
            background: #ffaa00;
            height: 30px;
            display: flex;
            align-items: center;
            padding-left: 18px;
            gap: 12px;
            color: #000000;
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .elim-stats-bar .sep {
            font-weight: 400;
            opacity: 0.4;
        }

        /* 3D Page Turn / Unfold Animation Sequence */
        @keyframes exactVideoUnfold {
            0% {
                opacity: 0;
                transform: rotateY(-85deg) skewY(-3deg) scaleX(0.5);
            }
            70% {
                transform: rotateY(10deg) skewY(1deg) scaleX(1.02);
            }
            100% {
                opacity: 1;
                transform: rotateY(0deg) skewY(0deg) scaleX(1);
            }
        }

        @keyframes exactVideoFold {
            0% {
                opacity: 1;
                transform: rotateY(0deg) scaleX(1);
            }
            100% {
                opacity: 0;
                transform: rotateY(-70deg) scaleX(0.6);
            }
        }

        /* =========================================================
           WINNING PREDICTION FORECAST OVERLAY
           ========================================================= */
        #prediction-container {
            position: absolute;
            left: 80px;
            bottom: 40px;
            display: flex;
            gap: 15px;
            z-index: 900;
        }

        .pred-card {
            display: flex;
            flex-direction: column;
            background: #11141a;
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 160px;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }

        .pred-top {
            background: #ffcc00;
            color: #000;
            font-size: 14px;
            font-weight: 800;
            text-align: center;
            padding: 2px 0;
            text-transform: uppercase;
        }

        .pred-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 46px;
            padding: 4px 10px;
            background: #181d28;
        }

        .pred-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
            background: #ffffff;
            border-radius: 3px;
            padding: 1px;
        }

        .pred-bars {
            display: flex;
            gap: 3px;
        }

        .pred-bar-line {
            width: 4px;
            height: 18px;
            background: rgba(255,255,255,0.2);
        }
        .pred-bar-line.active {
            background: #ffcc00;
            box-shadow: 0 0 6px #ffcc00;
        }

        .pred-bottom {
            background: #d03000;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            padding: 3px 0;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- ELIMINATION BANNER POPUP -->
    <div id="elim-banner">
        <div class="elim-card">
            <div class="elim-rank-tag" id="elim-rank-tag">#5</div>
            <div class="elim-logo-container">
                <img id="elim-logo-img" src="" onerror="this.style.display='none'">
            </div>
            <div class="elim-right-content">
                <div class="elim-main-banner">
                    <span>ELIMINATED</span>
                </div>
                <div class="elim-stats-bar">
                    <span id="elim-fin-text">0 FINISHES</span>
                    <span class="sep">|</span>
                    <span id="elim-pos-text">0 PLACE PTS.</span>
                </div>
            </div>
        </div>
    </div>

    <!-- WINNING PREDICTION FORECAST -->
    <div id="prediction-container"></div>
    
    <!-- LEADERBOARD SIDEBAR -->
    <div id="board"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SYNC_PATH = 'TournamentData/LiveSession';

        let currentElimId = "";

        db.ref(SYNC_PATH).on('value', (snap) => {
            const data = snap.val(); if(!data) return;
            const cfg = data.config || {};
            
            Object.keys(cfg).forEach(p => { 
                if (cfg[p]) {
                    document.documentElement.style.setProperty('--' + p, cfg[p]); 
                }
            });
            
            // ELIMINATION POPUP SCHEDULER
            if(data.lastEliminated && data.lastEliminated.id !== currentElimId) {
                currentElimId = data.lastEliminated.id;
                
                document.getElementById('elim-rank-tag').innerText = `#${data.lastEliminated.rank || 1}`;
                
                const logoImg = document.getElementById('elim-logo-img');
                if(data.lastEliminated.logo && data.lastEliminated.logo.trim() !== "") {
                    logoImg.src = data.lastEliminated.logo;
                    logoImg.style.display = 'block';
                } else {
                    logoImg.style.display = 'none';
                }

                document.getElementById('elim-fin-text').innerText = `${data.lastEliminated.finishes || 0} FINISHES`;
                
                let posPoints = 0;
                let r = data.lastEliminated.rank || 0;
                if(r === 1) posPoints = 10;
                else if(r === 2) posPoints = 6;
                else if(r === 3) posPoints = 5;
                else if(r === 4) posPoints = 4;
                else if(r === 5) posPoints = 3;
                else if(r === 6) posPoints = 2;
                else if(r === 7 || r === 8) posPoints = 1;

                document.getElementById('elim-pos-text').innerText = `${posPoints} PLACE PTS.`;
                
                const banner = document.getElementById('elim-banner');
                banner.classList.remove('show', 'hide-anim');
                void banner.offsetWidth; 
                banner.classList.add('show'); 
                
                setTimeout(() => { 
                    banner.classList.add('hide-anim');
                    setTimeout(() => { banner.classList.remove('show', 'hide-anim'); }, 350);
                }, 5000);
            }
            
            // WINNING PREDICTION MULTI-PATH PARSER
            const rawPred = data.predictions || data.predictionForecast || data.winningForecast || data.wwcdPrediction;
            renderPrediction(rawPred, data.teams);
            
            // LEADERBOARD RENDERER
            render(data.teams || []);
        });

        // Winning Prediction Forecast Renderer with Fallback Data Safety
        function renderPrediction(predList, teams) {
            const container = document.getElementById('prediction-container');
            let list = [];

            if(predList) {
                list = Array.isArray(predList) ? predList : Object.values(predList);
            } else if(teams && teams.length > 0) {
                // Fallback auto-calculator if no explicit prediction node is active in Firebase
                list = teams.slice(0, 3).map((t, idx) => ({
                    name: t.name || `TEAM ${idx+1}`,
                    logo: t.logo || '',
                    wwcd: idx === 0 ? '48%' : idx === 1 ? '32%' : '20%'
                }));
            }

            if(!list || list.length === 0) {
                container.innerHTML = "";
                return;
            }

            let html = "";
            list.slice(0, 3).forEach(p => {
                let logo = p.logo && p.logo.trim() !== "" ? p.logo : "https://via.placeholder.com/50";
                let pctVal = parseFloat(p.wwcd || p.percentage || p.val || 0);
                let pctText = p.wwcd ? (p.wwcd.toString().includes('%') ? p.wwcd : p.wwcd + '%') : pctVal + '%';

                let activeBars = 1;
                if(pctVal > 50) activeBars = 4;
                else if(pctVal > 30) activeBars = 3;
                else if(pctVal > 15) activeBars = 2;

                html += `
                    <div class="pred-card">
                        <div class="pred-top">${p.name || 'TEAM'}</div>
                        <div class="pred-body">
                            <img class="pred-logo" src="${logo}">
                            <div class="pred-bars">
                                <div class="pred-bar-line ${activeBars >= 1 ? 'active' : ''}"></div>
                                <div class="pred-bar-line ${activeBars >= 2 ? 'active' : ''}"></div>
                                <div class="pred-bar-line ${activeBars >= 3 ? 'active' : ''}"></div>
                                <div class="pred-bar-line ${activeBars >= 4 ? 'active' : ''}"></div>
                            </div>
                        </div>
                        <div class="pred-bottom">WWCD ${pctText}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Leaderboard Display
        function render(teams) {
            const board = document.getElementById('board');
            let h = `<div class="header-row"><div>#</div><div>LOGO</div><div style="text-align:left;">TEAM</div><div style="text-align:left; padding-left:5px;">STATUS</div><div>FIN.</div><div>TOTAL</div></div>`;
            
            const sortedTeams = [...teams].sort((a,b)=> {
                let totalA = (parseInt(a.totalFin) || 0) + (parseInt(a.totalPos) || 0);
                let totalB = (parseInt(b.totalFin) || 0) + (parseInt(b.totalPos) || 0);
                return totalB - totalA;
            });
            
            sortedTeams.forEach((t, i) => {
                let overallTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                let logoSrc = (t.logo && t.logo.trim() !== '') ? `<img src="${t.logo}" onerror="this.style.opacity='0'">` : '';
                let isEliminated = t.alive && t.alive.every(a => a == 0 || a == '0');

                h += `<div class="team-row ${isEliminated ? 'eliminated' : ''}">
                    <div style="text-align:center;">${i+1}</div>
                    <div class="logo-col">${logoSrc}</div>
                    <div class="name-col">${t.name || 'TEAM'}</div>
                    <div class="status-col">${(t.alive || [1,1,1,1]).map(a => `<div class="bar ${a ? '' : 'dead'}"></div>`).join('')}</div>
                    <div style="text-align:center;">${t.fin || 0}</div>
                    <div class="total-box">${overallTotal}</div>
                </div>`;
            });
            board.innerHTML = h;
        }
    </script>
</body>
</html>
