<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --dark-blue: #12193b; 
            --row-bg: #1a2245; 
            --cyan: #00f2ff; 
            --text-color: #ffffff; 
            --elim-bg: #15191d; 
            --pred-head-bg: #ffbc00;
            --pred-logo-bg: #ffffff;
            --pred-status-bg: #1f2125;
            --pred-wwcd-bg: #ff5722;
        }
        body { font-family: 'Oswald', sans-serif; margin: 0; background: #00FF00; overflow: hidden; width: 1920px; height: 1080px; }
        
        /* BOARD CONTAINER */
        #board { 
            position: absolute; 
            right: 40px; 
            bottom: 40px; 
            background: var(--dark-blue); 
            padding: 8px; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        .header-row, .team-row { display: grid; grid-template-columns: 25px 30px 55px 35px 30px 30px; align-items: center; gap: 2px; color: var(--text-color); }
        .header-row { font-size: 10px; color: var(--cyan); border-bottom: 1px solid rgba(0,242,255,0.3); margin-bottom: 4px; text-align: center; }
        
        .team-row { background: var(--row-bg); height: 32px; margin-bottom: 2px; }
        .team-row.eliminated { opacity: 0.4; filter: grayscale(1); }
        .logo-col { width: 22px; height: 22px; background: transparent; border-radius: 2px; margin: auto; display: flex; align-items: center; justify-content: center; }
        .logo-col img { width: 100%; height: 100%; object-fit: contain; }
        .name-col { padding-left: 5px; font-weight: bold; font-size: 13px; overflow: hidden; white-space: nowrap; text-transform: uppercase; }
        .status-col { display: flex; gap: 3px; justify-content: start; padding-left: 5px; }
        .bar { width: 4px; height: 14px; background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }
        .bar.dead { background: #444; box-shadow: none; opacity: 0.3; }
        .total-box { background: var(--cyan); color: #000; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        
        /* PREDICTION PANEL - EXACT CENTER HORIZONTAL LAYOUT */
        #prediction-panel { 
            position: absolute; 
            bottom: 60px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: none; 
            flex-direction: row; 
            gap: 25px; 
            align-items: flex-end;
            justify-content: center;
            z-index: 99;
        }
        #prediction-panel.show { display: flex; }
        
        .esports-pred-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 170px;
        }

        /* TOP TEAM NAME BADGE */
        .pred-top-tag {
            background: var(--pred-head-bg);
            color: #000;
            font-size: 13px;
            font-weight: 900;
            padding: 2px 16px;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            z-index: 2;
            margin-bottom: -4px;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* MAIN BODY BOX */
        .pred-body-box {
            display: flex;
            width: 100%;
            height: 55px;
            border-radius: 3px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .pred-logo-section {
            width: 55px;
            height: 100%;
            background: var(--pred-logo-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            box-sizing: border-box;
        }
        .pred-logo-section img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .pred-status-section {
            flex: 1;
            background: var(--pred-status-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 8px;
        }

        .p-bar {
            width: 7px;
            height: 28px;
            background: var(--cyan);
            border-radius: 1px;
        }
        .p-bar.dead {
            background: #3a3f47;
            opacity: 0.4;
        }

        /* BOTTOM WWCD PROBABILITY BADGE */
        .pred-bottom-tag {
            background: var(--pred-wwcd-bg);
            color: #ffffff;
            font-size: 14px;
            font-weight: 900;
            padding: 3px 0;
            width: 90%;
            text-align: center;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-top: -6px;
            z-index: 2;
        }

        /* ANIMATION */
        .trigger-animate { animation: slideUpCenter 0.5s ease-out forwards; }
        .trigger-card-animate { animation: slideUpCenter 0.4s ease-out forwards; }

        #elim-popup { 
            position: fixed; top: -200px; left: 50%; transform: translateX(-50%) scale(0.9); display: flex; width: 340px; height: 95px; background: var(--elim-bg) !important; border-radius: 4px; border: 2px solid var(--cyan); color: white; opacity: 0; box-shadow: 0 0 0px rgba(0,242,255,0); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #elim-popup.show { top: 40px; opacity: 1; transform: translateX(-50%) scale(1); box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 25px rgba(0,242,255,0.4); }
        #elim-popup.show #pop-name, #elim-popup.show #pop-logo, #elim-popup.show #pop-fin { animation: popInText 0.4s 0.3s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }
        #pop-name, #pop-fin { opacity: 0; transform: scale(0.8); }
        #pop-logo { opacity: 0; transform: translateY(-10px); transition: all 0.3s; }

        @keyframes slideUpCenter {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes popInText {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="elim-popup">
        <div style="background:transparent; width:100px; display:flex; align-items:center; justify-content:center;"><img id="pop-logo" style="width:70px;"></div>
        <div style="flex:1; padding:15px;"><p id="pop-name" style="font-size:30px; margin:0; text-transform:uppercase; font-weight: 900; letter-spacing: 1px;"></p><p style="color:var(--cyan); margin:0; font-size: 14px; letter-spacing: 2px;">ELIMINATED</p></div>
        <div style="width:100px; text-align:center; padding-top:15px;"><div id="pop-fin" style="font-size:35px; color:var(--cyan); font-weight: 900;">0</div></div>
    </div>
    
    <div id="prediction-panel"></div>
    <div id="board"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SYNC_PATH = 'TournamentData/LiveSession';

        let currentElimId = "";
        let cachedTeamsData = []; 
        let shouldAnimateNextRender = true;

        db.ref(SYNC_PATH).on('value', (snap) => {
            const data = snap.val(); if(!data) return;
            const cfg = data.config || {};
            Object.entries(cfg).forEach(([p,v]) => { document.documentElement.style.setProperty('--' + p, v); });
            
            if(data.lastEliminated && data.lastEliminated.id !== currentElimId) {
                currentElimId = data.lastEliminated.id;
                
                document.getElementById('pop-name').style.opacity = "0";
                document.getElementById('pop-fin').style.opacity = "0";
                document.getElementById('pop-logo').style.opacity = "0";

                document.getElementById('pop-logo').src = data.lastEliminated.logo;
                document.getElementById('pop-name').innerText = data.lastEliminated.name;
                document.getElementById('pop-fin').innerText = data.lastEliminated.finishes;
                
                const p = document.getElementById('elim-popup');
                p.classList.add('show'); 
                
                setTimeout(() => { p.classList.remove('show'); }, 4000);
            }
            
            cachedTeamsData = data.teams || [];
            render(cachedTeamsData);
        });

        function render(teams) {
            const board = document.getElementById('board');
            const pPanel = document.getElementById('prediction-panel');
            const alive = teams.filter(t => t.alive && t.alive.some(a => a === 1));

            board.classList.remove('trigger-animate');
            pPanel.classList.remove('trigger-animate');
            
            if (shouldAnimateNextRender) {
                void board.offsetWidth; 
                void pPanel.offsetWidth;
                board.classList.add('trigger-animate');
                pPanel.classList.add('trigger-animate');
                shouldAnimateNextRender = false; 
            }

            if (alive.length >= 2 && alive.length <= 5) {
                pPanel.classList.add('show'); 
                board.style.display = "none"; 
                pPanel.innerHTML = "";
                
                let totalS = alive.reduce((a,c) => {
                    let teamTotal = (parseInt(c.totalFin) || 0) + (parseInt(c.totalPos) || 0);
                    return a + (teamTotal + c.alive.filter(x=>x==1).length * 3);
                }, 0) || 1;
                
                alive.forEach((t, index) => {
                    let teamTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let winPerc = Math.round((((teamTotal + t.alive.filter(x=>x==1).length * 3)/totalS)*100));
                    
                    let cardAnimClass = pPanel.classList.contains('trigger-animate') ? 'trigger-card-animate' : '';
                    let cardDelay = cardAnimClass !== '' ? `style="animation-delay: ${(index * 0.06) + 0.1}s"` : '';
                    
                    let aliveBarsHTML = t.alive.map(a => `<div class="p-bar ${a ? '' : 'dead'}"></div>`).join('');

                    pPanel.innerHTML += `
                    <div class="esports-pred-card ${cardAnimClass}" ${cardDelay}>
                        <div class="pred-top-tag">${t.name}</div>
                        <div class="pred-body-box">
                            <div class="pred-logo-section">
                                <img src="${t.logo}" onerror="this.style.opacity='0'">
                            </div>
                            <div class="pred-status-section">
                                ${aliveBarsHTML}
                            </div>
                        </div>
                        <div class="pred-bottom-tag">WWCD - ${winPerc}%</div>
                    </div>`;
                });
            } else {
                pPanel.classList.remove('show'); 
                board.style.display = "block";
                
                let h = `<div class="header-row" style="background:none;"><div>#</div><div>LOGO</div><div style="text-align:left;">TEAM</div><div style="text-align:left; padding-left:5px;">STATUS</div><div>FIN.</div><div>TOTAL</div></div>`;
                
                const sortedTeams = [...teams].sort((a,b)=> {
                    let totalA = (parseInt(a.totalFin) || 0) + (parseInt(a.totalPos) || 0);
                    let totalB = (parseInt(b.totalFin) || 0) + (parseInt(b.totalPos) || 0);
                    return totalB - totalA;
                });
                
                sortedTeams.forEach((t, i) => {
                    let overallTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let rowAnimClass = board.classList.contains('trigger-animate') ? 'trigger-card-animate' : '';
                    let rowDelay = rowAnimClass !== '' ? `style="animation-delay: ${(i * 0.04) + 0.2}s"` : '';

                    h += `<div class="team-row ${t.alive.every(a=>a==0)?'eliminated':''} ${rowAnimClass}" ${rowDelay}>
                        <div style="text-align:center;">${i+1}</div><div class="logo-col"><img src="${t.logo}"></div>
                        <div class="name-col">${t.name}</div>
                        <div class="status-col">${t.alive.map(a => `<div class="bar ${a?'':'dead'}"></div>`).join('')}</div>
                        <div style="text-align:center;">${t.fin || 0}</div>
                        <div class="total-box">${overallTotal}</div>
                    </div>`;
                });
                board.innerHTML = h;
            }
        }

        // AUTOMATIC REFRESH LOOP (30s)
        setInterval(() => {
            const board = document.getElementById('board');
            const pPanel = document.getElementById('prediction-panel');
            
            board.style.display = "none";
            pPanel.classList.remove('show');
            
            setTimeout(() => {
                if(cachedTeamsData.length > 0) {
                    shouldAnimateNextRender = true; 
                    render(cachedTeamsData);
                }
            }, 2500); 
        }, 30000);
    </script>
</body>
</html>
