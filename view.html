<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BGMI Style Scoreboard (Image Match)</title>
<style>
    /* --- GENERAL STYLES --- */
    :root {
        --dark-bg: #001429;      /* Main Table Background */
        --header-bg: #003d73;    /* Header Row Background */
        --row-bg-odd: #002142;   /* Odd Rows Background */
        --row-bg-even: #001a33;  /* Even Rows Background */
        --total-bg: #00bad2;     /* Cyan/Blue for Total Column */
        --alive-color: #00ffff;  /* Status: Cyan */
        --knocked-color: #ffc107; /* Status: Gold */
        --eliminated-color: #6c757d; /* Status: Gray */
        --rank-width: 25px;
        --logo-width: 30px;
        --status-width: 70px;
        --fin-width: 35px;
        --total-width: 45px;
        --row-height: 28px;      /* Very compact height */
        --font-size: 13px;
    }

    body {
        margin: 0;
        background: #0a0f24;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: white;
        padding: 20px;
    }

    .table-container {
        width: auto; /* Width auto-calculates based on columns */
        background: var(--dark-bg);
        border-radius: 6px;
        overflow: hidden;
        border: 1px solid #083863;
    }

    /* --- FLEX-GRID FOR ROWS (Replaced Table for better gap control) --- */

    .row-wrapper {
        display: flex;
        align-items: center;
        /* Define column layout using fixed widths for tight packing */
        /* Columns: Rank | Logo | Team Name | Status | FIN | TOTAL */
        
        /* Set default row background */
        background: var(--row-bg-odd); 
        height: var(--row-height);
        font-size: var(--font-size);
        border-bottom: 1px solid rgba(255,255,255,0.05); /* Faint separator */
    }

    /* Alternating row colors for visual separation */
    .row-wrapper:nth-child(even) {
        background: var(--row-bg-even);
    }
    
    /* Highlighted row style (Example: Rank 4 - NBE) */
    .highlighted-row {
        background: #003d73 !important; /* Darker blue highlight */
        border-top: 1px solid #00569a;
        border-bottom: 1px solid #00569a;
    }
    .highlighted-row .total-cell {
        background: #00ffff !important; /* Brighter highlight */
        color: black !important;
    }

    /* --- HEADER STYLES --- */
    .header-row {
        background: var(--header-bg);
        font-weight: bold;
        color: #a0c0ff; /* Lighter header text */
    }

    /* --- CELL STYLES --- */

    .rank-cell {
        width: var(--rank-width);
        text-align: center;
        font-weight: bold;
        flex-shrink: 0;
        padding-left: 5px;
    }
    .logo-cell {
        width: var(--logo-width);
        text-align: center;
        flex-shrink: 0;
        padding: 0 2px;
    }
    .logo-cell img {
        height: 22px; /* Small logo size */
        width: 22px;
        object-fit: contain;
    }

    .team-cell {
        /* KEY: Allows team name to take space, pushing status bar to the right edge */
        flex-grow: 1; 
        font-weight: 600;
        padding-left: 4px; /* Minimal padding */
        padding-right: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .status-cell {
        width: var(--status-width);
        display: flex;
        justify-content: flex-start;
        flex-shrink: 0;
        padding: 0; /* NO PADDING HERE */
    }

    /* Status Bars (The colored blocks) */
    .bar {
        width: 9px; /* Very small bar width */
        height: 18px; /* Bar height */
        display: block; 
        flex-shrink: 0;
        /* Bars are now flush against each other */
    }
    .bar.alive { background: var(--alive-color); }
    .bar.knocked { background: var(--knocked-color); }
    .bar.eliminated { background: var(--eliminated-color); }

    .fin-cell {
        width: var(--fin-width);
        text-align: center;
        font-weight: bold;
        flex-shrink: 0;
    }

    .total-cell {
        width: var(--total-width);
        text-align: center;
        font-weight: bold;
        flex-shrink: 0;
        
        /* Final look styling */
        background: var(--total-bg);
        color: black;
        height: var(--row-height);
        line-height: var(--row-height); /* Center text vertically */
        padding: 0; /* NO PADDING HERE */
    }
    
    /* Total cell in Header Row needs different color */
    .header-row .total-cell {
        background: var(--header-bg);
        color: #a0c0ff;
    }
</style>
</head>
<body>

<div class="table-container">
    <div class="header-row row-wrapper">
        <div class="rank-cell">#</div>
        <div class="logo-cell"></div>
        <div class="team-cell">TEAM NAME</div>
        <div class="status-cell">STATUS</div>
        <div class="fin-cell">FIN.</div>
        <div class="total-cell">TOTAL</div>
    </div>

    <div class="data-rows" id="data-rows">
        </div>
</div>

<script>
// --- Data and Logic ---

// Sample Data (Matching the provided images)
let teams = [
    { rank: 1, name: "OG", logo: "", alive: 4, knocked: 0, finished: 1, total: 71 },
    { rank: 2, name: "SOUL", logo: "", alive: 2, knocked: 2, finished: 1, total: 67, highlight: true }, /* Example highlight */
    { rank: 3, name: "TR", logo: "", alive: 4, knocked: 0, finished: 0, total: 44 },
    { rank: 4, name: "NBE", logo: "", alive: 4, knocked: 0, finished: 0, total: 44 },
    { rank: 5, name: "K9", logo: "", alive: 4, knocked: 0, finished: 0, total: 37 },
    { rank: 6, name: "M4", logo: "", alive: 2, knocked: 0, finished: 0, total: 35 },
    { rank: 7, name: "8BIT", logo: "", alive: 4, knocked: 0, finished: 1, total: 34 },
    { rank: 8, name: "FS", logo: "", alive: 4, knocked: 0, finished: 4, total: 33 },
    { rank: 9, name: "VS", logo: "", alive: 3, knocked: 0, finished: 2, total: 33 },
    { rank: 10, name: "MAD", logo: "", alive: 4, knocked: 0, finished: 4, total: 32 },
    { rank: 11, name: "GOOL", logo: "", alive: 4, knocked: 0, finished: 1, total: 32 },
    { rank: 12, name: "WW", logo: "", alive: 4, knocked: 0, finished: 1, total: 30 },
    { rank: 13, name: "CK", logo: "", alive: 4, knocked: 0, finished: 0, total: 30 },
    { rank: 14, name: "GDR", logo: "", alive: 4, knocked: 0, finished: 0, total: 30 },
    // Total players per squad is assumed to be 4 for status bars
];


// Generates the visual status bars (4 bars total)
function statusBars(alive, knocked) {
    let html = "";
    // Total squad size is 4. Eliminated = 4 - Alive - Knocked
    const eliminated = 4 - alive - knocked; 
    
    // Alive (Cyan/Blue)
    for(let i=0;i<alive;i++) html+=`<div class="bar alive"></div>`; 
    
    // Knocked (Gold/Yellow)
    for(let i=0;i<knocked;i++) html+=`<div class="bar knocked"></div>`; 
    
    // Eliminated (Gray)
    for(let i=0;i<eliminated;i++) html+=`<div class="bar eliminated"></div>`;
    
    return html;
}


function renderBoard() {
    const container = document.getElementById("data-rows");
    container.innerHTML = ''; // Clear previous content

    teams.forEach((t, i) => {
        const row = document.createElement('div');
        row.className = `row-wrapper ${(t.highlight ? 'highlighted-row' : '')}`;

        // Ensure rank is based on index for simplicity in this static example
        t.rank = i + 1; 

        row.innerHTML = `
            <div class="rank-cell">${t.rank}</div>
            <div class="logo-cell"><img src="${t.logo || ''}" alt=""></div>
            <div class="team-cell">${t.name}</div>
            <div class="status-cell">
                ${statusBars(t.alive, t.knocked)}
            </div>
            <div class="fin-cell">${t.finished}</div>
            <div class="total-cell">${t.total}</div>
        `;
        container.appendChild(row);
    });
}

// Initial call
renderBoard();
</script>

</body>
</html>
