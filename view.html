<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #00f2ff; 
            --dark-blue: #12193b; 
            --row-bg: #1a2245; 
            --text-color: #ffffff; 
            --status-bg: #252c33;
            --top-row-bg: #15191d;
            --elim-bg: #e63900;
        }

        body { 
            font-family: 'Oswald', sans-serif; 
            margin: 0; 
            background: #00FF00; 
            overflow: hidden; 
            width: 1920px; 
            height: 1080px; 
        }
        
        #board { 
            position: absolute; 
            right: 40px; 
            bottom: 40px; 
            background: var(--dark-blue); 
            padding: 8px; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        .header-row, .team-row { display: grid; grid-template-columns: 25px 30px 55px 35px 30px 30px; align-items: center; gap: 2px; color: var(--text-color); }
        .header-row { font-size: 10px; color: var(--cyan); background: var(--top-row-bg); border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 4px; text-align: center; }
        
        .team-row { background: var(--row-bg); height: 32px; margin-bottom: 2px; }
        .team-row.eliminated { opacity: 0.4; filter: grayscale(1); }
        .logo-col { width: 22px; height: 22px; background: transparent; border-radius: 2px; margin: auto; display: flex; align-items: center; justify-content: center; }
        .logo-col img { width: 100%; height: 100%; object-fit: contain; }
        .name-col { padding-left: 5px; font-weight: bold; font-size: 13px; overflow: hidden; white-space: nowrap; text-transform: uppercase; }
        .status-col { display: flex; gap: 3px; justify-content: start; padding-left: 5px; background: var(--status-bg); }
        .bar { width: 4px; height: 14px; background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }
        .bar.dead { background: #444; box-shadow: none; opacity: 0.3; }
        .total-box { background: var(--cyan); color: #000; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        
        /* ELIMINATION POPUP DESIGN */
        #elim-banner { position: absolute; left: 50%; top: 80px; transform: translateX(-50%); display: none; z-index: 1000; }
        #elim-banner.show { display: block; }
        .elim-container { position: relative; display: flex; align-items: stretch; height: 60px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .elim-rank-badge { position: absolute; top: -18px; left: -14px; background: var(--cyan) !important; color: #000000 !important; font-size: 18px; font-weight: 900; padding: 1px 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 10; }
        .elim-logo-box { width: 75px; height: 60px; background: #ffffff !important; display: flex; align-items: center; justify-content: center; padding: 5px; box-sizing: border-box; z-index: 3; }
        .elim-logo-box img { width: 100%; height: 100%; object-fit: contain; }
        
        /* DYNAMIC BACKGROUND COLOR FROM ADMIN */
        .elim-main-text { 
            background: var(--elim-bg) !important; 
            border-top: 2px solid rgba(255,255,255,0.3); 
            display: flex; align-items: center; justify-content: center; padding: 0 45px; min-width: 240px; position: relative; z-index: 2; 
        }
        
        #elim-banner.show .elim-main-text { animation: broadcastUnfold 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .elim-main-text span { font-size: 32px; font-weight: 900; color: var(--text-color); letter-spacing: 2.5px; text-transform: uppercase; text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7); }
        .elim-bottom-strip { position: absolute; bottom: -22px; left: 75px; right: 0; background: var(--cyan) !important; color: #000000 !important; font-size: 15px; font-weight: 900; padding: 2px 0; text-align: center; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); z-index: 1; }

        @keyframes broadcastUnfold {
            0% { opacity: 0; transform: scaleX(0.8); }
            100% { opacity: 1; transform: scaleX(1); }
        }
    </style>
</head>
<body>
    <!-- ELIMINATION BANNER -->
    <div id="elim-banner">
        <div class="elim-container">
            <div class="elim-rank-badge" id="elim-rank-tag">#7</div>
            <div class="elim-logo-box"><img id="elim-logo-img" src="" onerror="this.style.opacity='0'"></div>
            <div class="elim-main-text"><span>ELIMINATED</span></div>
            <div class="elim-bottom-strip" id="elim-stats-strip">0 FINISHES</div>
        </div>
    </div>
    
    <div id="board"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SYNC_PATH = 'TournamentData/LiveSession';

        let currentElimId = "";

        db.ref(SYNC_PATH).on('value', (snap) => {
            const data = snap.val(); if(!data) return;
            const cfg = data.config || {};
            
            // DYNAMICALLY APPLY ALL 7 COLORS FROM ADMIN
            Object.keys(cfg).forEach(p => { 
                if (cfg[p]) {
                    document.documentElement.style.setProperty('--' + p, cfg[p]); 
                }
            });
            
            // TRIGGER ELIMINATION POPUP
            if(data.lastEliminated && data.lastEliminated.id !== currentElimId) {
                currentElimId = data.lastEliminated.id;
                
                document.getElementById('elim-rank-tag').innerText = `#${data.lastEliminated.rank || 1}`;
                
                const logoImg = document.getElementById('elim-logo-img');
                if(data.lastEliminated.logo && data.lastEliminated.logo.trim() !== "") {
                    logoImg.src = data.lastEliminated.logo;
                    logoImg.style.opacity = '1';
                } else {
                    logoImg.style.opacity = '0';
                }

                document.getElementById('elim-stats-strip').innerHTML = `${data.lastEliminated.finishes || 0} FINISHES`;
                
                const banner = document.getElementById('elim-banner');
                banner.classList.remove('show');
                void banner.offsetWidth;
                banner.classList.add('show'); 
                
                setTimeout(() => { banner.classList.remove('show'); }, 4500);
            }
            
            render(data.teams || []);
        });

        function render(teams) {
            const board = document.getElementById('board');
            let h = `<div class="header-row"><div>#</div><div>LOGO</div><div style="text-align:left;">TEAM</div><div style="text-align:left; padding-left:5px;">STATUS</div><div>FIN.</div><div>TOTAL</div></div>`;
            
            const sortedTeams = [...teams].sort((a,b)=> {
                let totalA = (parseInt(a.totalFin) || 0) + (parseInt(a.totalPos) || 0);
                let totalB = (parseInt(b.totalFin) || 0) + (parseInt(b.totalPos) || 0);
                return totalB - totalA;
            });
            
            sortedTeams.forEach((t, i) => {
                let overallTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                let logoSrc = (t.logo && t.logo.trim() !== '') ? `<img src="${t.logo}" onerror="this.style.opacity='0'">` : '';

                h += `<div class="team-row ${t.alive && t.alive.every(a=>a==0)?'eliminated':''}">
                    <div style="text-align:center;">${i+1}</div>
                    <div class="logo-col">${logoSrc}</div>
                    <div class="name-col">${t.name || 'TEAM'}</div>
                    <div class="status-col">${(t.alive || [1,1,1,1]).map(a => `<div class="bar ${a?'':'dead'}"></div>`).join('')}</div>
                    <div style="text-align:center;">${t.fin || 0}</div>
                    <div class="total-box">${overallTotal}</div>
                </div>`;
            });
            board.innerHTML = h;
        }
    </script>
</body>
</html>
