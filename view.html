<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --theme: #ffbc00; 
            --board-bg: #8e44ad; 
            --row-bg: #1e1f29; 
            --text-color: #ffffff; 
            --accent2: #ff4757; 
            --logo-bg: #ffffff; 
        }
        body { font-family: 'Oswald', sans-serif; margin: 0; background: #00FF00; overflow: hidden; width: 1920px; height: 1080px; }
        
        /* LEADERBOARD CONTAINER */
        #board { 
            position: absolute; 
            right: 40px; 
            bottom: 40px; 
            background: var(--board-bg); 
            padding: 8px; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        .header-row, .team-row { display: grid; grid-template-columns: 25px 30px 55px 35px 30px 30px; align-items: center; gap: 2px; color: var(--text-color); }
        .header-row { font-size: 10px; color: var(--theme); border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 4px; text-align: center; }
        
        .team-row { background: var(--row-bg); height: 32px; margin-bottom: 2px; }
        .team-row.eliminated { opacity: 0.4; filter: grayscale(1); }
        .logo-col { width: 22px; height: 22px; background: transparent; border-radius: 2px; margin: auto; display: flex; align-items: center; justify-content: center; }
        .logo-col img { width: 100%; height: 100%; object-fit: contain; }
        .name-col { padding-left: 5px; font-weight: bold; font-size: 13px; overflow: hidden; white-space: nowrap; text-transform: uppercase; }
        .status-col { display: flex; gap: 3px; justify-content: start; padding-left: 5px; }
        .bar { width: 4px; height: 14px; background: var(--text-color); box-shadow: 0 0 5px var(--text-color); }
        .bar.dead { background: #444; box-shadow: none; opacity: 0.3; }
        .total-box { background: var(--theme); color: #000; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        
        /* PREDICTION PANEL - EXACT CENTER LAYOUT */
        #prediction-panel { 
            position: absolute; 
            bottom: 60px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: none; 
            flex-direction: row; 
            gap: 25px; 
            align-items: flex-end;
            justify-content: center;
            z-index: 99;
        }
        #prediction-panel.show { display: flex; }
        
        .esports-pred-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 170px;
        }

        /* 1. TOP TEAM NAME BADGE */
        .pred-top-tag {
            background: var(--theme);
            color: #000;
            font-size: 13px;
            font-weight: 900;
            padding: 2px 16px;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            z-index: 2;
            margin-bottom: -4px;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 2. MAIN BODY BOX */
        .pred-body-box {
            display: flex;
            width: 100%;
            height: 55px;
            border-radius: 3px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .pred-logo-section {
            width: 55px;
            height: 100%;
            background: var(--logo-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            box-sizing: border-box;
        }
        .pred-logo-section img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .pred-status-section {
            flex: 1;
            background: var(--row-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 8px;
        }

        .p-bar {
            width: 7px;
            height: 28px;
            background: var(--text-color);
            border-radius: 1px;
        }
        .p-bar.dead {
            background: #3a3f47;
            opacity: 0.4;
        }

        /* 3. BOTTOM WWCD PROBABILITY BADGE */
        .pred-bottom-tag {
            background: var(--accent2);
            color: var(--text-color);
            font-size: 14px;
            font-weight: 900;
            padding: 3px 0;
            width: 90%;
            text-align: center;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-top: -6px;
            z-index: 2;
        }

        /* NEW ELIMINATION BANNER POPUP (BGMI BROADCAST STYLE) */
        #elim-banner {
            position: absolute;
            left: 50%;
            bottom: -150px;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 1000;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #elim-banner.show {
            bottom: 60px;
            opacity: 1;
        }

        .elim-top-rank {
            background: var(--theme);
            color: #000;
            font-size: 16px;
            font-weight: 900;
            padding: 2px 10px;
            border-radius: 2px 2px 0 0;
            margin-left: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 2;
            margin-bottom: -2px;
        }

        .elim-main-box {
            display: flex;
            height: 55px;
            background: #0b0e11;
            border-radius: 3px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }

        .elim-logo-square {
            width: 55px;
            height: 55px;
            background: var(--logo-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            box-sizing: border-box;
        }
        .elim-logo-square img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .elim-text-center {
            background: linear-gradient(90deg, #1f0b00, #400d00, #1f0b00);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 35px;
            border-left: 2px solid rgba(255,255,255,0.1);
        }
        .elim-text-center span {
            font-size: 26px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #ff3300, 0 0 20px #ff0000;
            text-transform: uppercase;
        }

        .elim-bottom-strip {
            background: var(--theme);
            color: #000;
            font-size: 13px;
            font-weight: 900;
            padding: 3px 15px;
            width: 85%;
            margin-top: -3px;
            border-radius: 0 0 2px 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 2;
            align-self: center;
            text-align: center;
        }

        /* ANIMATIONS */
        .trigger-animate { animation: slideUpCenter 0.5s ease-out forwards; }
        .trigger-card-animate { animation: slideUpCenter 0.4s ease-out forwards; }

        @keyframes slideUpCenter {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- NEW ELIMINATION BANNER POPUP -->
    <div id="elim-banner">
        <div class="elim-top-rank" id="elim-rank-tag">#15</div>
        <div class="elim-main-box">
            <div class="elim-logo-square"><img id="elim-logo-img"></div>
            <div class="elim-text-center"><span>ELIMINATED</span></div>
        </div>
        <div class="elim-bottom-strip" id="elim-stats-strip">0 FINISHES | 0 PLACE PTS.</div>
    </div>
    
    <div id="prediction-panel"></div>
    <div id="board"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SYNC_PATH = 'TournamentData/LiveSession';

        let currentElimId = "";
        let cachedTeamsData = []; 
        let shouldAnimateNextRender = true;

        db.ref(SYNC_PATH).on('value', (snap) => {
            const data = snap.val(); if(!data) return;
            const cfg = data.config || {};
            Object.entries(cfg).forEach(([p,v]) => { document.documentElement.style.setProperty('--' + p, v); });
            
            // SHOW ELIMINATION BANNER
            if(data.lastEliminated && data.lastEliminated.id !== currentElimId) {
                currentElimId = data.lastEliminated.id;
                
                document.getElementById('elim-rank-tag').innerText = `#${data.lastEliminated.rank || 15}`;
                document.getElementById('elim-logo-img').src = data.lastEliminated.logo;
                document.getElementById('elim-stats-strip').innerText = `${data.lastEliminated.finishes || 0} FINISHES  |  ${data.lastEliminated.placePts || 0} PLACE PTS.`;
                
                const banner = document.getElementById('elim-banner');
                banner.classList.add('show'); 
                
                setTimeout(() => { banner.classList.remove('show'); }, 4500);
            }
            
            cachedTeamsData = data.teams || [];
            render(cachedTeamsData);
        });

        function render(teams) {
            const board = document.getElementById('board');
            const pPanel = document.getElementById('prediction-panel');
            const alive = teams.filter(t => t.alive && t.alive.some(a => a === 1));

            board.classList.remove('trigger-animate');
            pPanel.classList.remove('trigger-animate');
            
            if (shouldAnimateNextRender) {
                void board.offsetWidth; 
                void pPanel.offsetWidth;
                board.classList.add('trigger-animate');
                pPanel.classList.add('trigger-animate');
                shouldAnimateNextRender = false; 
            }

            // SHOW PREDICTION CARDS WHEN 2 TO 5 TEAMS ALIVE
            if (alive.length >= 2 && alive.length <= 5) {
                pPanel.classList.add('show'); 
                board.style.display = "none"; 
                pPanel.innerHTML = "";
                
                let totalS = alive.reduce((a,c) => {
                    let teamTotal = (parseInt(c.totalFin) || 0) + (parseInt(c.totalPos) || 0);
                    return a + (teamTotal + c.alive.filter(x=>x==1).length * 3);
                }, 0) || 1;
                
                alive.forEach((t, index) => {
                    let teamTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let winPerc = Math.round((((teamTotal + t.alive.filter(x=>x==1).length * 3)/totalS)*100));
                    
                    let cardAnimClass = pPanel.classList.contains('trigger-animate') ? 'trigger-card-animate' : '';
                    let cardDelay = cardAnimClass !== '' ? `style="animation-delay: ${(index * 0.06) + 0.1}s"` : '';
                    
                    let aliveBarsHTML = t.alive.map(a => `<div class="p-bar ${a ? '' : 'dead'}"></div>`).join('');

                    pPanel.innerHTML += `
                    <div class="esports-pred-card ${cardAnimClass}" ${cardDelay}>
                        <div class="pred-top-tag">${t.name}</div>
                        <div class="pred-body-box">
                            <div class="pred-logo-section">
                                <img src="${t.logo}" onerror="this.style.opacity='0'">
                            </div>
                            <div class="pred-status-section">
                                ${aliveBarsHTML}
                            </div>
                        </div>
                        <div class="pred-bottom-tag">WWCD - ${winPerc}%</div>
                    </div>`;
                });
            } else {
                pPanel.classList.remove('show'); 
                board.style.display = "block";
                
                let h = `<div class="header-row" style="background:none;"><div>#</div><div>LOGO</div><div style="text-align:left;">TEAM</div><div style="text-align:left; padding-left:5px;">STATUS</div><div>FIN.</div><div>TOTAL</div></div>`;
                
                const sortedTeams = [...teams].sort((a,b)=> {
                    let totalA = (parseInt(a.totalFin) || 0) + (parseInt(a.totalPos) || 0);
                    let totalB = (parseInt(b.totalFin) || 0) + (parseInt(b.totalPos) || 0);
                    return totalB - totalA;
                });
                
                sortedTeams.forEach((t, i) => {
                    let overallTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let rowAnimClass = board.classList.contains('trigger-animate') ? 'trigger-card-animate' : '';
                    let rowDelay = rowAnimClass !== '' ? `style="animation-delay: ${(i * 0.04) + 0.2}s"` : '';

                    h += `<div class="team-row ${t.alive.every(a=>a==0)?'eliminated':''} ${rowAnimClass}" ${rowDelay}>
                        <div style="text-align:center;">${i+1}</div><div class="logo-col"><img src="${t.logo}"></div>
                        <div class="name-col">${t.name}</div>
                        <div class="status-col">${t.alive.map(a => `<div class="bar ${a?'':'dead'}"></div>`).join('')}</div>
                        <div style="text-align:center;">${t.fin || 0}</div>
                        <div class="total-box">${overallTotal}</div>
                    </div>`;
                });
                board.innerHTML = h;
            }
        }

        // AUTO REFRESH LOOP (30s)
        setInterval(() => {
            const board = document.getElementById('board');
            const pPanel = document.getElementById('prediction-panel');
            
            board.style.display = "none";
            pPanel.classList.remove('show');
            
            setTimeout(() => {
                if(cachedTeamsData.length > 0) {
                    shouldAnimateNextRender = true; 
                    render(cachedTeamsData);
                }
            }, 2500); 
        }, 30000);
    </script>
</body>
</html>
