<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght=700&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --text-color: #ffffff; --status-color: #00f2ff; }
        body { font-family: 'Oswald', sans-serif; margin: 0; background: #00FF00; overflow: hidden; width: 1920px; height: 1080px; }
        
        /* THE MASTER BOARD BOX - ACCORDING TO YOUR RATIO */
        #board { 
            position: absolute; 
            right: 40px; 
            bottom: 40px; 
            width: 320px; 
            height: 730px; 
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            padding-top: 38px; /* Safe space for your Header area */
            padding-bottom: 35px; /* Safe space for Alive/Eliminated footer bar */
        }

        #rows-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* Automatically stretches rows perfectly based on total teams */
            padding: 0 5px;
        }
        
        /* ACCURATE COLUMN WIDTH ALIGNMENT WITH YOUR IMAGE BLOCKS */
        .team-row { 
            display: grid; 
            grid-template-columns: 28px 30px 88px 58px 35px 40px; 
            align-items: center; 
            color: var(--text-color); 
            text-align: center; 
            height: 100%;
            max-height: 38px;
            font-size: 14px; 
            font-weight: bold; 
        }
        .team-row.eliminated { opacity: 0.25; filter: grayscale(1); }
        
        .logo-col { width: 22px; height: 22px; margin: auto; display: flex; align-items: center; justify-content: center; }
        .logo-col img { width: 100%; height: 100%; object-fit: contain; }
        .name-col { text-align: left; padding-left: 5px; overflow: hidden; white-space: nowrap; text-transform: uppercase; text-shadow: 1px 1px 2px #000; }
        
        /* STATUS ALIVE BARS */
        .status-col { display: flex; gap: 3px; justify-content: center; }
        .bar { width: 4px; height: 14px; background: var(--status-color); box-shadow: 0 0 4px var(--status-color); }
        .bar.dead { background: #444; box-shadow: none; opacity: 0.2; }
        
        /* PREDICTION PANEL */
        #prediction-panel { position: absolute; bottom: 40px; right: 40px; display: none; flex-direction: column; gap: 8px; }
        #prediction-panel.show { display: flex; }
        .pred-card { width: 320px; height: 65px; background-size: 100% 100%; background-repeat: no-repeat; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; color: white; }
        
        /* TIMED REFRESH ANIMATIONS */
        .trigger-animate { animation: slideUpFade 0.5s ease-out forwards; }
        .trigger-card-animate { animation: slideUpFade 0.4s ease-out forwards; }

        /* ELIMINATION BANNER POPUP */
        #elim-popup { position: fixed; top: -200px; left: 50%; transform: translateX(-50%) scale(0.9); display: flex; width: 340px; height: 95px; background-size: 100% 100%; background-repeat: no-repeat; color: white; opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #elim-popup.show { top: 40px; opacity: 1; transform: translateX(-50%) scale(1); box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        #elim-popup.show #pop-name, #elim-popup.show #pop-logo, #elim-popup.show #pop-fin { animation: popInText 0.4s 0.3s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }
        #pop-name, #pop-fin { opacity: 0; transform: scale(0.8); }

        @keyframes slideUpFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popInText { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="elim-popup">
        <div style="width:100px; display:flex; align-items:center; justify-content:center;"><img id="pop-logo" style="width:65px; object-fit:contain;"></div>
        <div style="flex:1; padding:15px; display:flex; flex-direction:column; justify-content:center;"><p id="pop-name" style="font-size:26px; margin:0; text-transform:uppercase; font-weight:900; line-height:1;"></p><p style="color:var(--cyan); margin:0; font-size:12px; letter-spacing:2px; font-weight:bold;">ELIMINATED</p></div>
        <div style="width:90px; display:flex; align-items:center; justify-content:center; font-size:35px; color:var(--cyan); font-weight:900;" id="pop-fin">0</div>
    </div>

    <div id="prediction-panel"></div>

    <div id="board">
        <div id="rows-wrapper"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SYNC_PATH = 'TournamentData/LiveSession';

        let currentElimId = ""; let cachedTeamsData = []; let shouldAnimateNextRender = true;

        db.ref(SYNC_PATH).on('value', (snap) => {
            const data = snap.val(); if(!data) return;
            const cfg = data.config || {};
            Object.entries(cfg).forEach(([p,v]) => { document.documentElement.style.setProperty('--' + p, v); });
            
            // Set uploaded master background image 
            if(cfg['gfx-full-table']) document.getElementById('board').style.backgroundImage = `url('${cfg['gfx-full-table']}')`;
            if(cfg['gfx-elim']) document.getElementById('elim-popup').style.backgroundImage = `url('${cfg['gfx-elim']}')`;

            if(data.lastEliminated && data.lastEliminated.id !== currentElimId) {
                currentElimId = data.lastEliminated.id;
                document.getElementById('pop-logo').src = data.lastEliminated.logo;
                document.getElementById('pop-name').innerText = data.lastEliminated.name;
                document.getElementById('pop-fin').innerText = data.lastEliminated.finishes;
                const p = document.getElementById('elim-popup'); p.classList.add('show'); 
                setTimeout(() => p.classList.remove('show'), 4000);
            }
            
            cachedTeamsData = data.teams || [];
            render(cachedTeamsData, cfg);
        });

        function render(teams, cfg) {
            const board = document.getElementById('board');
            const pPanel = document.getElementById('prediction-panel');
            const rowsWrapper = document.getElementById('rows-wrapper');
            const alive = teams.filter(t => t.alive && t.alive.some(a => a === 1));

            board.classList.remove('trigger-animate');
            pPanel.classList.remove('trigger-animate');
            
            if (shouldAnimateNextRender) {
                void board.offsetWidth; void pPanel.offsetWidth;
                board.classList.add('trigger-animate');
                pPanel.classList.add('trigger-animate');
                shouldAnimateNextRender = false; 
            }

            if (alive.length >= 2 && alive.length <= 5) {
                pPanel.classList.add('show'); board.style.display="none"; pPanel.innerHTML="";
                let totalS = alive.reduce((a,c) => a + (((parseInt(c.totalFin)||0)+(parseInt(c.totalPos)||0)) + c.alive.filter(x=>x==1).length * 3), 0) || 1;
                
                alive.forEach((t, index) => {
                    let teamTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let winPerc = Math.round((((teamTotal + t.alive.filter(x=>x==1).length * 3)/totalS)*100));
                    let cardAnimClass = board.classList.contains('trigger-animate') ? 'trigger-card-animate' : '';
                    let cardDelay = cardAnimClass !== '' ? `style="animation-delay: ${(index * 0.05) + 0.2}s; background-image: url('${cfg['gfx-pred']||''}');"` : `style="background-image: url('${cfg['gfx-pred']||''}');"`;
                    
                    pPanel.innerHTML += `<div class="pred-card ${cardAnimClass}" ${cardDelay}>
                        <img src="${t.logo}" style="width:32px; height:32px; object-fit:contain; margin-right:10px;">
                        <div style="flex:1;">
                            <div style="font-size:13px; font-weight:bold;">${t.name}</div>
                            <div style="font-size:9px; color:#ccc;">${teamTotal} TOTAL PTS</div>
                        </div>
                        <div style="color:var(--cyan); font-size:20px; font-weight:900;">${winPerc}%</div>
                    </div>`;
                });
            } else {
                pPanel.classList.remove('show'); board.style.display="flex"; rowsWrapper.innerHTML = '';
                
                const sortedTeams = [...teams].sort((a,b)=> ((parseInt(b.totalFin)||0)+(parseInt(b.totalPos)||0)) - ((parseInt(a.totalFin)||0)+(parseInt(a.totalPos)||0)) );
                
                sortedTeams.forEach((t, i) => {
                    let overallTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let rowAnimClass = board.classList.contains('trigger-animate') ? 'trigger-card-animate' : '';
                    let rowDelay = rowAnimClass !== '' ? `style="animation-delay: ${(i * 0.04) + 0.2}s;"` : '';

                    rowsWrapper.innerHTML += `<div class="team-row ${t.alive.every(a=>a==0)?'eliminated':''} ${rowAnimClass}" ${rowDelay}>
                        <div>${i+1}</div>
                        <div class="logo-col"><img src="${t.logo}"></div>
                        <div class="name-col">${t.name}</div>
                        <div class="status-col">${t.alive.map(a => `<div class="bar ${a?'':'dead'}"></div>`).join('')}</div>
                        <div>${t.fin || 0}</div>
                        <div style="color:var(--cyan); font-weight:900;">${overallTotal}</div>
                    </div>`;
                });
            }
        }

        // AUTOMATIC 30 SECONDS REFRESH LOOP
        setInterval(() => {
            const board = document.getElementById('board');
            const pPanel = document.getElementById('prediction-panel');
            board.style.display = "none"; pPanel.classList.remove('show');
            setTimeout(() => {
                if(cachedTeamsData.length > 0) {
                    shouldAnimateNextRender = true;
                    db.ref(SYNC_PATH + '/config').once('value', (s) => render(cachedTeamsData, s.val()||{}));
                }
            }, 2500); 
        }, 30000);
    </script>
</body>
</html>
