<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #ffcc00; 
            --dark-blue: #12193b; 
            --row-bg: #1a2245; 
            --text-color: #ffffff; 
            --status-bg: #252c33;
            --top-row-bg: #15191d;
            --elim-bg: #15191d;
            --pred-bg: #0b0e11;
        }

        * {
            box-sizing: border-box;
            font-family: 'Oswald', sans-serif;
        }

        body { 
            margin: 0; 
            background: #00FF00; 
            overflow: hidden; 
            width: 1920px; 
            height: 1080px; 
        }
        
        /* LEADERBOARD BOARD RIGHT SIDE */
        #board { 
            position: absolute; 
            right: 40px; 
            bottom: 40px; 
            background: var(--dark-blue); 
            padding: 8px; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            transition: all 0.5s ease;
        }
        
        .header-row, .team-row { 
            display: grid; 
            grid-template-columns: 25px 30px 65px 45px 30px 35px; 
            align-items: center; 
            gap: 2px; 
            color: var(--text-color); 
        }

        .header-row { 
            font-size: 11px; 
            color: var(--cyan); 
            background: var(--top-row-bg); 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
            margin-bottom: 4px; 
            text-align: center; 
        }
        
        .team-row { 
            background: var(--row-bg); 
            height: 32px; 
            margin-bottom: 2px; 
            transition: all 0.3s ease; 
        }

        .team-row.eliminated { 
            opacity: 0.4; 
            filter: grayscale(1); 
        }

        .logo-col { 
            width: 22px; 
            height: 22px; 
            background: transparent; 
            border-radius: 2px; 
            margin: auto; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .logo-col img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }

        .name-col { 
            padding-left: 5px; 
            font-weight: bold; 
            font-size: 13px; 
            overflow: hidden; 
            white-space: nowrap; 
            text-transform: uppercase; 
        }
        
        /* ALIVE STATUS BARS & ANIMATION */
        .status-col { 
            display: flex; 
            gap: 3px; 
            justify-content: center; 
            background: var(--status-bg); 
            height: 100%; 
            align-items: center; 
            padding: 0 4px;
        }

        .bar { 
            width: 5px; 
            height: 18px; 
            background: #ffcc00; 
            box-shadow: 0 0 8px #ffcc00; 
            animation: liveBarPulse 1.2s infinite ease-in-out alternate;
        }

        .bar.dead { 
            background: #333333; 
            box-shadow: none; 
            opacity: 0.3; 
            animation: none; 
        }

        .total-box { 
            background: var(--cyan); 
            color: #000; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
        }
        
        @keyframes liveBarPulse {
            0% { transform: scaleY(0.85); opacity: 0.7; }
            100% { transform: scaleY(1.1); opacity: 1; box-shadow: 0 0 10px #ffcc00; }
        }

        /* WINNING PREDICTION LAYOUT */
        #prediction-container {
            position: absolute;
            left: 80px;
            bottom: 40px;
            display: flex;
            gap: 12px;
            z-index: 900;
            transition: all 0.5s ease;
        }

        .pred-card {
            display: flex;
            flex-direction: column;
            width: 160px;
            position: relative;
            transition: all 0.4s ease;
        }

        .pred-top-tag {
            background: #ffb800;
            color: #000000;
            font-weight: 800;
            font-size: 13px;
            text-align: center;
            width: 75%;
            margin: 0 auto;
            padding: 1px 0;
            border-radius: 2px 2px 0 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 2;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .pred-middle-box {
            display: flex;
            height: 50px;
            background: #1e1e1e;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .pred-logo-box {
            width: 52px;
            height: 100%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
        }

        .pred-logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .pred-bars-box {
            flex: 1;
            background: #252525;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        /* FIXED EQUAL HEIGHT BARS */
        .pred-player-bar {
            width: 6px;
            height: 24px;
            border-radius: 1px;
            transition: all 0.3s ease;
        }

        .pred-player-bar.alive {
            background: #ffcc00;
            box-shadow: 0 0 8px #ffcc00;
            opacity: 1;
        }
        
        .pred-player-bar.dead {
            background: #444444;
            box-shadow: none;
            opacity: 0.3;
        }

        .pred-bottom-bar {
            background: linear-gradient(90deg, #d83a00 0%, #b82800 100%);
            color: #ffffff;
            font-size: 14px;
            font-weight: 800;
            text-align: center;
            padding: 3px 0;
            letter-spacing: 0.5px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }

        /* DYNAMIC TRIGGER ANIMATION CLASSES */
        .trigger-animate {
            animation: slideUpFade 0.5s ease-out forwards;
        }
        .trigger-card-animate {
            animation: slideUpFade 0.4s ease-out forwards;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ELIMINATION BANNER POPUP */
        #elim-banner { 
            position: absolute; 
            left: 80px; 
            bottom: 240px; 
            display: none; 
            z-index: 1000; 
            perspective: 1200px;
        }
        
        #elim-banner.show { 
            display: block; 
        }
        
        #elim-banner.show .elim-card {
            animation: exactPageUnfold 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        #elim-banner.hide-anim .elim-card {
            animation: exactPageFold 0.4s ease-in forwards;
        }

        .elim-card { 
            display: flex; 
            align-items: stretch; 
            position: relative; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            transform-origin: left center;
            opacity: 0;
            background: #ffffff;
        }

        .elim-rank-tag {
            position: absolute;
            top: -15px;
            left: -15px;
            background: #ffaa00;
            color: #000000;
            font-size: 26px;
            font-weight: 800;
            padding: 2px 10px;
            line-height: 1;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .elim-logo-container {
            width: 80px;
            height: 80px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            z-index: 10;
        }

        .elim-logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .elim-right-content {
            display: flex;
            flex-direction: column;
            width: 360px;
        }

        .elim-main-banner {
            background: linear-gradient(180deg, #e63900 0%, #a32200 100%);
            height: 50px;
            display: flex;
            align-items: center;
            padding-left: 18px;
        }

        .elim-main-banner span {
            font-size: 38px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1;
        }

        .elim-stats-bar {
            background: #ffaa00;
            height: 30px;
            display: flex;
            align-items: center;
            padding-left: 18px;
            gap: 12px;
            color: #000000;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .elim-stats-bar .sep {
            font-weight: 400;
            opacity: 0.4;
        }

        @keyframes exactPageUnfold {
            0% { opacity: 0; transform: rotateY(-90deg) scaleX(0.3); }
            70% { transform: rotateY(12deg) scaleX(1.02); }
            100% { opacity: 1; transform: rotateY(0deg) scaleX(1); }
        }

        @keyframes exactPageFold {
            0% { opacity: 1; transform: rotateY(0deg) scaleX(1); }
            100% { opacity: 0; transform: rotateY(-80deg) scaleX(0.4); }
        }
    </style>
</head>
<body>

    <!-- ELIMINATION BANNER POPUP -->
    <div id="elim-banner">
        <div class="elim-card">
            <div class="elim-rank-tag" id="elim-rank-tag">#5</div>
            <div class="elim-logo-container">
                <img id="elim-logo-img" src="" onerror="this.style.display='none'">
            </div>
            <div class="elim-right-content">
                <div class="elim-main-banner">
                    <span>ELIMINATED</span>
                </div>
                <div class="elim-stats-bar">
                    <span id="elim-fin-text">1 FINISHES</span>
                    <span class="sep">|</span>
                    <span id="elim-pos-text">3 PLACE PTS.</span>
                </div>
            </div>
        </div>
    </div>

    <!-- WINNING PREDICTION FORECAST -->
    <div id="prediction-container"></div>
    
    <!-- LEADERBOARD SIDEBAR -->
    <div id="board"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SYNC_PATH = 'TournamentData/LiveSession';

        let currentElimId = "";
        let cachedTeamsData = [];
        let cachedPredData = null;
        let shouldAnimateNextRender = true;

        db.ref(SYNC_PATH).on('value', (snap) => {
            const data = snap.val(); if(!data) return;
            const cfg = data.config || {};
            
            Object.entries(cfg).forEach(([p, v]) => { 
                if (v) document.documentElement.style.setProperty('--' + p, v); 
            });

            cachedTeamsData = data.teams || [];
            cachedPredData = data.predictions || data.predictionForecast || data.winningForecast || data.wwcdPrediction || null;

            // ELIMINATION POPUP TRIGGER
            if(data.lastEliminated && data.lastEliminated.id !== currentElimId) {
                currentElimId = data.lastEliminated.id;
                
                document.getElementById('elim-rank-tag').innerText = `#${data.lastEliminated.rank || 1}`;
                const logoImg = document.getElementById('elim-logo-img');
                if(data.lastEliminated.logo && data.lastEliminated.logo.trim() !== "") {
                    logoImg.src = data.lastEliminated.logo;
                    logoImg.style.display = 'block';
                } else {
                    logoImg.style.display = 'none';
                }

                document.getElementById('elim-fin-text').innerText = `${data.lastEliminated.finishes || 0} FINISHES`;
                let posPoints = 0;
                let r = data.lastEliminated.rank || 0;
                if(r === 1) posPoints = 10;
                else if(r === 2) posPoints = 6;
                else if(r === 3) posPoints = 5;
                else if(r === 4) posPoints = 4;
                else if(r === 5) posPoints = 3;
                else if(r === 6) posPoints = 2;
                else if(r === 7 || r === 8) posPoints = 1;

                document.getElementById('elim-pos-text').innerText = `${posPoints} PLACE PTS.`;
                
                const banner = document.getElementById('elim-banner');
                banner.classList.remove('show', 'hide-anim');
                void banner.offsetWidth; 
                banner.classList.add('show'); 
                
                setTimeout(() => { 
                    banner.classList.add('hide-anim');
                    setTimeout(() => { banner.classList.remove('show', 'hide-anim'); }, 400);
                }, 5000);
            }

            render(cachedTeamsData, cachedPredData);
        });

        function render(teams, predData) {
            const board = document.getElementById('board');
            const predContainer = document.getElementById('prediction-container');

            // COUNT ALIVE TEAMS IN MATCH
            const aliveTeams = teams.filter(t => t.alive && t.alive.some(a => a == 1 || a == '1'));

            // LOGIC: IF ALIVE TEAMS <= 5 -> SHOW PREDICTION, HIDE LEADERBOARD
            // IF ALIVE TEAMS > 5 -> SHOW LEADERBOARD, HIDE PREDICTION
            const showPrediction = aliveTeams.length <= 5 && aliveTeams.length >= 2;

            if (showPrediction) {
                board.style.display = 'none'; // HIDE LEADERBOARD IN TOP 5
                predContainer.style.display = 'flex'; // SHOW PREDICTION
            } else {
                board.style.display = 'block'; // SHOW LEADERBOARD
                predContainer.style.display = 'none'; // HIDE PREDICTION
                predContainer.innerHTML = '';
            }

            board.classList.remove('trigger-animate');
            predContainer.classList.remove('trigger-animate');

            if (shouldAnimateNextRender) {
                void board.offsetWidth;
                void predContainer.offsetWidth;
                if (!showPrediction) board.classList.add('trigger-animate');
                if (showPrediction) predContainer.classList.add('trigger-animate');
                shouldAnimateNextRender = false;
            }

            // Render Prediction (Only if Top 5 alive)
            if (showPrediction) {
                renderPrediction(predData, aliveTeams, predContainer.classList.contains('trigger-animate'));
            }

            // Render Leaderboard
            let h = `<div class="header-row"><div>#</div><div>LOGO</div><div style="text-align:left;">TEAM</div><div style="text-align:center;">STATUS</div><div>FIN.</div><div>TOTAL</div></div>`;
            
            const sortedTeams = [...teams].sort((a,b)=> {
                let totalA = (parseInt(a.totalFin) || 0) + (parseInt(a.totalPos) || 0);
                let totalB = (parseInt(b.totalFin) || 0) + (parseInt(b.totalPos) || 0);
                return totalB - totalA;
            });

            sortedTeams.forEach((t, i) => {
                let overallTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                let logoSrc = (t.logo && t.logo.trim() !== '') ? `<img src="${t.logo}" onerror="this.style.opacity='0'">` : '';
                let isEliminated = t.alive && t.alive.every(a => a == 0 || a == '0');

                let cardAnimClass = board.classList.contains('trigger-animate') ? 'trigger-card-animate' : '';
                let cardDelay = cardAnimClass !== '' ? `style="animation-delay: ${(i * 0.04) + 0.1}s"` : '';

                h += `<div class="team-row ${isEliminated ? 'eliminated' : ''} ${cardAnimClass}" ${cardDelay}>
                    <div style="text-align:center;">${i+1}</div>
                    <div class="logo-col">${logoSrc}</div>
                    <div class="name-col">${t.name || 'TEAM'}</div>
                    <div class="status-col">${(t.alive || [1,1,1,1]).map(a => `<div class="bar ${a == 1 || a == '1' ? '' : 'dead'}"></div>`).join('')}</div>
                    <div style="text-align:center;">${t.fin || 0}</div>
                    <div class="total-box">${overallTotal}</div>
                </div>`;
            });
            board.innerHTML = h;
        }

        function renderPrediction(rawPredData, aliveTeams, isAnimating) {
            const container = document.getElementById('prediction-container');
            let displayList = [];

            if (rawPredData) {
                let rawList = Array.isArray(rawPredData) ? rawPredData : Object.values(rawPredData);
                
                rawList.forEach(p => {
                    let liveTeam = aliveTeams.find(t => (t.name || '').toLowerCase().trim() === (p.name || '').toLowerCase().trim());
                    if (liveTeam) {
                        displayList.push({
                            name: liveTeam.name,
                            logo: liveTeam.logo || p.logo,
                            alive: liveTeam.alive,
                            wwcd: p.wwcd || p.winChance || '20%'
                        });
                    }
                });
            }

            // AUTO-CALCULATE FOR ALIVE TEAMS (TOP 5)
            if (displayList.length === 0 && aliveTeams.length >= 2) {
                let totalScoreSum = aliveTeams.reduce((acc, t) => {
                    let totalPts = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let aliveCount = t.alive.filter(a => a == 1 || a == '1').length;
                    return acc + (totalPts + (aliveCount * 4));
                }, 0) || 1;

                displayList = aliveTeams.map(t => {
                    let totalPts = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let aliveCount = t.alive.filter(a => a == 1 || a == '1').length;
                    let prob = Math.round((((totalPts + (aliveCount * 4)) / totalScoreSum) * 100));
                    return {
                        name: t.name,
                        logo: t.logo,
                        alive: t.alive,
                        wwcd: prob + '%'
                    };
                }).sort((a,b) => parseInt(b.wwcd) - parseInt(a.wwcd));
            }

            if (displayList.length === 0) {
                container.innerHTML = "";
                return;
            }

            let html = "";
            let cardAnimClass = isAnimating ? 'trigger-card-animate' : '';

            displayList.slice(0, 5).forEach((p, idx) => {
                let logoSrc = p.logo && p.logo.trim() !== "" ? p.logo : "";
                let pctText = p.wwcd ? (p.wwcd.toString().includes('%') ? p.wwcd : p.wwcd + '%') : '20%';
                let cardDelay = cardAnimClass !== '' ? `style="animation-delay: ${(idx * 0.05) + 0.15}s"` : '';
                
                let playerAliveArr = p.alive || [1, 1, 1, 1];

                html += `
                    <div class="pred-card ${cardAnimClass}" ${cardDelay}>
                        <div class="pred-top-tag">${p.name || 'TEAM'}</div>
                        <div class="pred-middle-box">
                            <div class="pred-logo-box">
                                ${logoSrc ? `<img src="${logoSrc}">` : ''}
                            </div>
                            <div class="pred-bars-box">
                                <div class="pred-player-bar ${playerAliveArr[0] == 1 || playerAliveArr[0] == '1' ? 'alive' : 'dead'}"></div>
                                <div class="pred-player-bar ${playerAliveArr[1] == 1 || playerAliveArr[1] == '1' ? 'alive' : 'dead'}"></div>
                                <div class="pred-player-bar ${playerAliveArr[2] == 1 || playerAliveArr[2] == '1' ? 'alive' : 'dead'}"></div>
                                <div class="pred-player-bar ${playerAliveArr[3] == 1 || playerAliveArr[3] == '1' ? 'alive' : 'dead'}"></div>
                            </div>
                        </div>
                        <div class="pred-bottom-bar">WWCD - ${pctText}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // 30 SECOND LOOP REFRESH
        setInterval(() => {
            const board = document.getElementById('board');
            const predContainer = document.getElementById('prediction-container');
            
            board.style.opacity = "0";
            predContainer.style.opacity = "0";
            
            setTimeout(() => {
                if(cachedTeamsData.length > 0) {
                    shouldAnimateNextRender = true;
                    board.style.opacity = "1";
                    predContainer.style.opacity = "1";
                    render(cachedTeamsData, cachedPredData);
                }
            }, 300); 
        }, 30000);
    </script>
</body>
</html>
