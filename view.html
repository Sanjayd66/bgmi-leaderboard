<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --cyan: #ffcc00; 
            --dark-blue: #12193b; 
            --row-bg: #1a2245; 
            --text-color: #ffffff; 
            --status-bg: #252c33;
            --top-row-bg: #15191d;
            --elim-bg: #c83200;
        }

        body { 
            font-family: 'Oswald', sans-serif; 
            margin: 0; 
            background: #00FF00; 
            overflow: hidden; 
            width: 1920px; 
            height: 1080px; 
        }
        
        /* Main Points Board */
        #board { 
            position: absolute; 
            right: 40px; 
            bottom: 40px; 
            background: var(--dark-blue); 
            padding: 8px; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        .header-row, .team-row { display: grid; grid-template-columns: 25px 30px 55px 35px 30px 30px; align-items: center; gap: 2px; color: var(--text-color); }
        .header-row { font-size: 10px; color: var(--cyan); background: var(--top-row-bg); border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 4px; text-align: center; }
        
        .team-row { background: var(--row-bg); height: 32px; margin-bottom: 2px; }
        .team-row.eliminated { opacity: 0.4; filter: grayscale(1); }
        .logo-col { width: 22px; height: 22px; background: transparent; border-radius: 2px; margin: auto; display: flex; align-items: center; justify-content: center; }
        .logo-col img { width: 100%; height: 100%; object-fit: contain; }
        .name-col { padding-left: 5px; font-weight: bold; font-size: 13px; overflow: hidden; white-space: nowrap; text-transform: uppercase; }
        .status-col { display: flex; gap: 3px; justify-content: start; padding-left: 5px; background: var(--status-bg); }
        .bar { width: 4px; height: 14px; background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }
        .bar.dead { background: #444; box-shadow: none; opacity: 0.3; }
        .total-box { background: var(--cyan); color: #000; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        
        /* =========================================================
           VIDEO MATCHED FOLDING ELIMINATION POPUP STYLES
           ========================================================= */
        #elim-banner { 
            position: absolute; 
            left: 60px; 
            bottom: 250px; 
            display: none; 
            z-index: 1000; 
            perspective: 1000px;
        }
        
        #elim-banner.show { 
            display: block; 
        }
        
        #elim-banner.show .elim-card {
            animation: videoUnfoldIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .elim-card { 
            display: flex; 
            align-items: stretch; 
            position: relative; 
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7);
            transform-origin: left center;
            opacity: 0;
        }

        /* Rank Square (#5, #7) */
        .elim-rank-tag {
            position: absolute;
            top: -15px;
            left: -15px;
            background: var(--cyan) !important;
            color: #000000;
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            font-weight: 800;
            padding: 2px 10px;
            line-height: 1;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            z-index: 12;
        }

        /* Team Logo Box (Left Side) */
        .elim-logo-container {
            width: 90px;
            height: 84px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
            box-sizing: border-box;
            border-right: 2px solid rgba(0,0,0,0.1);
            z-index: 11;
        }

        .elim-logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        /* Info Content Base (Right Side Wrapper) */
        .elim-right-content {
            display: flex;
            flex-direction: column;
            width: 360px;
        }

        /* Top Main Red Block - Text Style Clean Bold Sans-Serif */
        .elim-main-banner {
            background: linear-gradient(180deg, var(--elim-bg) 0%, #7d1400 100%) !important;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 20px;
        }

        .elim-main-banner span {
            font-family: 'Oswald', sans-serif;
            font-size: 40px;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1;
        }

        /* Bottom Yellow Strip Bar */
        .elim-stats-bar {
            background: var(--cyan) !important;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 20px;
            gap: 12px;
            color: #000000;
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .elim-stats-bar .sep {
            font-weight: 500;
            opacity: 0.5;
        }

        /* Exact Video Style Fold Ribbon Animation */
        @keyframes videoUnfoldIn {
            0% {
                opacity: 0;
                transform: rotateY(-60deg) scaleX(0.7);
            }
            100% {
                opacity: 1;
                transform: rotateY(0deg) scaleX(1);
            }
        }

        /* =========================================================
           WINNING PREDICTION FORECAST OVERLAY LAYOUT
           ========================================================= */
        #prediction-container {
            position: absolute;
            left: 60px;
            bottom: 40px;
            display: flex;
            gap: 20px;
            z-index: 900;
        }

        .pred-card {
            display: flex;
            flex-direction: column;
            background: #11141a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 170px;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .pred-top {
            background: #ffcc00;
            color: #000;
            font-size: 14px;
            font-weight: 800;
            text-align: center;
            padding: 2px 0;
            text-transform: uppercase;
        }

        .pred-body {
            display: flex;
            align-items: center;
            height: 50px;
            padding: 5px 10px;
            gap: 10px;
            background: #1a1f29;
        }

        .pred-logo {
            width: 36px;
            height: 36px;
            object-fit: contain;
            background: #fff;
            border-radius: 3px;
            padding: 2px;
        }

        .pred-bars {
            display: flex;
            gap: 3px;
        }

        .pred-bar-line {
            width: 4px;
            height: 22px;
            background: #ffffff;
        }
        .pred-bar-line.active {
            background: #ffcc00;
        }

        .pred-bottom {
            background: #e64a19;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            padding: 3px 0;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="elim-banner">
        <div class="elim-card">
            <div class="elim-rank-tag" id="elim-rank-tag">#5</div>
            <div class="elim-logo-container">
                <img id="elim-logo-img" src="" onerror="this.style.display='none'">
            </div>
            <div class="elim-right-content">
                <div class="elim-main-banner">
                    <span>ELIMINATED</span>
                </div>
                <div class="elim-stats-bar">
                    <span id="elim-fin-text">0 FINISHES</span>
                    <span class="sep">|</span>
                    <span id="elim-pos-text">0 PLACE PTS.</span>
                </div>
            </div>
        </div>
    </div>

    <div id="prediction-container"></div>
    
    <div id="board"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SYNC_PATH = 'TournamentData/LiveSession';

        let currentElimId = "";

        db.ref(SYNC_PATH).on('value', (snap) => {
            const data = snap.val(); if(!data) return;
            const cfg = data.config || {};
            
            // Apply Dynamic Panel Custom Colors
            Object.keys(cfg).forEach(p => { 
                if (cfg[p]) {
                    document.documentElement.style.setProperty('--' + p, cfg[p]); 
                }
            });
            
            // ELIMINATION POPUP SCHEDULER & ANIMATION LOGIC
            if(data.lastEliminated && data.lastEliminated.id !== currentElimId) {
                currentElimId = data.lastEliminated.id;
                
                document.getElementById('elim-rank-tag').innerText = `#${data.lastEliminated.rank || 1}`;
                
                const logoImg = document.getElementById('elim-logo-img');
                if(data.lastEliminated.logo && data.lastEliminated.logo.trim() !== "") {
                    logoImg.src = data.lastEliminated.logo;
                    logoImg.style.display = 'block';
                } else {
                    logoImg.style.display = 'none';
                }

                document.getElementById('elim-fin-text').innerText = `${data.lastEliminated.finishes || 0} FINISHES`;
                
                // Dynamic Accurate Place Points Calculator based on rank rules
                let posPoints = 0;
                let r = data.lastEliminated.rank || 0;
                if(r === 1) posPoints = 10;
                else if(r === 2) posPoints = 6;
                else if(r === 3) posPoints = 5;
                else if(r === 4) posPoints = 4;
                else if(r === 5) posPoints = 3;
                else if(r === 6) posPoints = 2;
                else if(r === 7 || r === 8) posPoints = 1;

                document.getElementById('elim-pos-text').innerText = `${posPoints} PLACE PTS.`;
                
                const banner = document.getElementById('elim-banner');
                banner.classList.remove('show');
                void banner.offsetWidth; // Force element reflow for restart animation
                banner.classList.add('show'); 
                
                setTimeout(() => { banner.classList.remove('show'); }, 6000);
            }
            
            // WINNING PREDICTION PROCESSOR
            renderPrediction(data.predictions || data.predictionForecast || []);
            
            // Render Main Right Board Table
            render(data.teams || []);
        });

        // Winning Prediction Display Builder
        function renderPrediction(predList) {
            const container = document.getElementById('prediction-container');
            if(!predList || predList.length === 0) {
                container.innerHTML = ""; 
                return; 
            }

            let html = "";
            // Slice top 3 or all available predictions
            predList.slice(0, 3).forEach(p => {
                let logo = p.logo && p.logo.trim() !== "" ? p.logo : "https://via.placeholder.com/50";
                let wwcdPercentage = p.wwcd || p.percentage || "0%";
                if(!wwcdPercentage.toString().includes('%')) wwcdPercentage += "%";

                html += `
                    <div class="pred-card">
                        <div class="pred-top">${p.name || 'TEAM'}</div>
                        <div class="pred-body">
                            <img class="pred-logo" src="${logo}">
                            <div class="pred-bars">
                                <div class="pred-bar-line active"></div>
                                <div class="pred-bar-line active"></div>
                                <div class="pred-bar-line active"></div>
                                <div class="pred-bar-line"></div>
                            </div>
                        </div>
                        <div class="pred-bottom">WWCD - ${wwcdPercentage}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // Leaderboard Table Renderer
        function render(teams) {
            const board = document.getElementById('board');
            let h = `<div class="header-row"><div>#</div><div>LOGO</div><div style="text-align:left;">TEAM</div><div style="text-align:left; padding-left:5px;">STATUS</div><div>FIN.</div><div>TOTAL</div></div>`;
            
            const sortedTeams = [...teams].sort((a,b)=> {
                let totalA = (parseInt(a.totalFin) || 0) + (parseInt(a.totalPos) || 0);
                let totalB = (parseInt(b.totalFin) || 0) + (parseInt(b.totalPos) || 0);
                return totalB - totalA;
            });
            
            sortedTeams.forEach((t, i) => {
                let overallTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                let logoSrc = (t.logo && t.logo.trim() !== '') ? `<img src="${t.logo}" onerror="this.style.opacity='0'">` : '';

                h += `<div class="team-row ${t.alive && t.alive.every(a=>a==0)?'eliminated':''}">
                    <div style="text-align:center;">${i+1}</div>
                    <div class="logo-col">${logoSrc}</div>
                    <div class="name-col">${t.name || 'TEAM'}</div>
                    <div class="status-col">${(t.alive || [1,1,1,1]).map(a => `<div class="bar ${a?'':'dead'}"></div>`).join('')}</div>
                    <div style="text-align:center;">${t.fin || 0}</div>
                    <div class="total-box">${overallTotal}</div>
                </div>`;
            });
            board.innerHTML = h;
        }
    </script>
</body>
</html>
