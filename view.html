<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --theme: #ffc800; 
            --board-bg: #8e44ad; 
            --row-bg: #1e1f29; 
            --text-color: #ffffff; 
            --accent2: #ff4757; 
            --logo-bg: #ffffff; 
        }
        body { 
            font-family: 'Oswald', sans-serif; 
            margin: 0; 
            background: #00FF00; 
            overflow: hidden; 
            width: 1920px; 
            height: 1080px; 
        }
        
        /* LEADERBOARD CONTAINER */
        #board { 
            position: absolute; 
            right: 40px; 
            bottom: 40px; 
            background: var(--board-bg); 
            padding: 8px; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        .header-row, .team-row { display: grid; grid-template-columns: 25px 30px 55px 35px 30px 30px; align-items: center; gap: 2px; color: var(--text-color); }
        .header-row { font-size: 10px; color: var(--theme); border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 4px; text-align: center; }
        
        .team-row { background: var(--row-bg); height: 32px; margin-bottom: 2px; }
        .team-row.eliminated { opacity: 0.4; filter: grayscale(1); }
        .logo-col { width: 22px; height: 22px; background: transparent; border-radius: 2px; margin: auto; display: flex; align-items: center; justify-content: center; }
        .logo-col img { width: 100%; height: 100%; object-fit: contain; }
        .name-col { padding-left: 5px; font-weight: bold; font-size: 13px; overflow: hidden; white-space: nowrap; text-transform: uppercase; }
        .status-col { display: flex; gap: 3px; justify-content: start; padding-left: 5px; }
        .bar { width: 4px; height: 14px; background: var(--text-color); box-shadow: 0 0 5px var(--text-color); }
        .bar.dead { background: #444; box-shadow: none; opacity: 0.3; }
        .total-box { background: var(--theme); color: #000; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        
        /* PREDICTION PANEL */
        #prediction-panel { 
            position: absolute; 
            bottom: 60px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: none; 
            flex-direction: row; 
            gap: 25px; 
            align-items: flex-end;
            justify-content: center;
            z-index: 99;
        }
        #prediction-panel.show { display: flex; }
        
        .esports-pred-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 170px;
        }

        .pred-top-tag {
            background: var(--theme);
            color: #000;
            font-size: 13px;
            font-weight: 900;
            padding: 2px 16px;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
            z-index: 2;
            margin-bottom: -4px;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pred-body-box {
            display: flex;
            width: 100%;
            height: 55px;
            border-radius: 3px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .pred-logo-section {
            width: 55px;
            height: 100%;
            background: var(--logo-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            box-sizing: border-box;
        }
        .pred-logo-section img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .pred-status-section {
            flex: 1;
            background: var(--row-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 0 8px;
        }

        .p-bar {
            width: 7px;
            height: 28px;
            background: var(--text-color);
            border-radius: 1px;
        }
        .p-bar.dead {
            background: #3a3f47;
            opacity: 0.4;
        }

        .pred-bottom-tag {
            background: var(--accent2);
            color: var(--text-color);
            font-size: 14px;
            font-weight: 900;
            padding: 3px 0;
            width: 90%;
            text-align: center;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-top: -6px;
            z-index: 2;
        }

        /* BROADCAST ACCURATE ELIMINATION BANNER WITH UNFOLD ANIMATION */
        #elim-banner {
            position: absolute;
            left: 50%;
            bottom: 80px;
            transform: translateX(-50%);
            display: none;
            z-index: 1000;
        }
        #elim-banner.show {
            display: block;
        }

        .elim-container {
            position: relative;
            display: flex;
            align-items: stretch;
            height: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            perspective: 1000px;
        }

        /* OVERHANG RANK TAG (#7) */
        .elim-rank-badge {
            position: absolute;
            top: -18px;
            left: -14px;
            background: var(--theme);
            color: #000;
            font-size: 18px;
            font-weight: 900;
            padding: 1px 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            z-index: 10;
        }

        /* WHITE LOGO SQUARE */
        .elim-logo-box {
            width: 75px;
            height: 60px;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            box-sizing: border-box;
            z-index: 3;
        }
        .elim-logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* GRADIENT CENTER ELIMINATED BANNER WITH BROADCAST UNROLL ANIMATION */
        .elim-main-text {
            background: linear-gradient(180deg, #e63900 0%, #7a1500 100%);
            border-top: 2px solid #ff6a00;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 45px;
            min-width: 240px;
            position: relative;
            z-index: 2;
            transform-origin: left center;
        }
        
        #elim-banner.show .elim-main-text {
            animation: broadcastUnfold 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .elim-main-text span {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
        }

        /* YELLOW BOTTOM STRIP WITH DELAYED SLIDE-DOWN */
        .elim-bottom-strip {
            position: absolute;
            bottom: -22px;
            left: 75px;
            right: 0;
            background: var(--theme);
            color: #000;
            font-size: 15px;
            font-weight: 900;
            padding: 2px 0;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            z-index: 1;
            transform-origin: top center;
        }

        #elim-banner.show .elim-bottom-strip {
            animation: stripSlideDown 0.35s ease-out 0.3s forwards;
            opacity: 0;
        }

        /* BROADCAST REVEAL ANIMATIONS */
        @keyframes broadcastUnfold {
            0% {
                clip-path: polygon(0 0, 0 0, 0 100%, 0 100%);
                transform: rotateY(-30deg) scaleX(0.8);
                opacity: 0;
            }
            100% {
                clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
                transform: rotateY(0deg) scaleX(1);
                opacity: 1;
            }
        }

        @keyframes stripSlideDown {
            0% {
                transform: translateY(-100%);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* GENERAL LIST ANIMATION */
        .trigger-animate { animation: slideUpCenter 0.5s ease-out forwards; }
        .trigger-card-animate { animation: slideUpCenter 0.4s ease-out forwards; }

        @keyframes slideUpCenter {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- FIXED BROADCAST ELIMINATION BANNER -->
    <div id="elim-banner">
        <div class="elim-container">
            <div class="elim-rank-badge" id="elim-rank-tag">#7</div>
            <div class="elim-logo-box"><img id="elim-logo-img"></div>
            <div class="elim-main-text"><span>ELIMINATED</span></div>
            <div class="elim-bottom-strip" id="elim-stats-strip">2 FINISHES &nbsp;|&nbsp; 1 PLACE PTS.</div>
        </div>
    </div>
    
    <div id="prediction-panel"></div>
    <div id="board"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SYNC_PATH = 'TournamentData/LiveSession';

        let currentElimId = "";
        let cachedTeamsData = []; 
        let shouldAnimateNextRender = true;

        db.ref(SYNC_PATH).on('value', (snap) => {
            const data = snap.val(); if(!data) return;
            const cfg = data.config || {};
            Object.entries(cfg).forEach(([p,v]) => { document.documentElement.style.setProperty('--' + p, v); });
            
            // TRIGGER ELIMINATION POPUP
            if(data.lastEliminated && data.lastEliminated.id !== currentElimId) {
                currentElimId = data.lastEliminated.id;
                
                document.getElementById('elim-rank-tag').innerText = `#${data.lastEliminated.rank || 7}`;
                document.getElementById('elim-logo-img').src = data.lastEliminated.logo;
                document.getElementById('elim-stats-strip').innerHTML = `${data.lastEliminated.finishes || 0} FINISHES &nbsp;|&nbsp; ${data.lastEliminated.placePts || 0} PLACE PTS.`;
                
                const banner = document.getElementById('elim-banner');
                banner.classList.remove('show');
                void banner.offsetWidth; // Trigger reflow for reset animation
                banner.classList.add('show'); 
                
                setTimeout(() => { banner.classList.remove('show'); }, 4500);
            }
            
            cachedTeamsData = data.teams || [];
            render(cachedTeamsData);
        });

        function render(teams) {
            const board = document.getElementById('board');
            const pPanel = document.getElementById('prediction-panel');
            const alive = teams.filter(t => t.alive && t.alive.some(a => a === 1));

            board.classList.remove('trigger-animate');
            pPanel.classList.remove('trigger-animate');
            
            if (shouldAnimateNextRender) {
                void board.offsetWidth; 
                void pPanel.offsetWidth;
                board.classList.add('trigger-animate');
                pPanel.classList.add('trigger-animate');
                shouldAnimateNextRender = false; 
            }

            if (alive.length >= 2 && alive.length <= 5) {
                pPanel.classList.add('show'); 
                board.style.display = "none"; 
                pPanel.innerHTML = "";
                
                let totalS = alive.reduce((a,c) => {
                    let teamTotal = (parseInt(c.totalFin) || 0) + (parseInt(c.totalPos) || 0);
                    return a + (teamTotal + c.alive.filter(x=>x==1).length * 3);
                }, 0) || 1;
                
                alive.forEach((t, index) => {
                    let teamTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let winPerc = Math.round((((teamTotal + t.alive.filter(x=>x==1).length * 3)/totalS)*100));
                    
                    let cardAnimClass = pPanel.classList.contains('trigger-animate') ? 'trigger-card-animate' : '';
                    let cardDelay = cardAnimClass !== '' ? `style="animation-delay: ${(index * 0.06) + 0.1}s"` : '';
                    
                    let aliveBarsHTML = t.alive.map(a => `<div class="p-bar ${a ? '' : 'dead'}"></div>`).join('');

                    pPanel.innerHTML += `
                    <div class="esports-pred-card ${cardAnimClass}" ${cardDelay}>
                        <div class="pred-top-tag">${t.name}</div>
                        <div class="pred-body-box">
                            <div class="pred-logo-section">
                                <img src="${t.logo}" onerror="this.style.opacity='0'">
                            </div>
                            <div class="pred-status-section">
                                ${aliveBarsHTML}
                            </div>
                        </div>
                        <div class="pred-bottom-tag">WWCD - ${winPerc}%</div>
                    </div>`;
                });
            } else {
                pPanel.classList.remove('show'); 
                board.style.display = "block";
                
                let h = `<div class="header-row" style="background:none;"><div>#</div><div>LOGO</div><div style="text-align:left;">TEAM</div><div style="text-align:left; padding-left:5px;">STATUS</div><div>FIN.</div><div>TOTAL</div></div>`;
                
                const sortedTeams = [...teams].sort((a,b)=> {
                    let totalA = (parseInt(a.totalFin) || 0) + (parseInt(a.totalPos) || 0);
                    let totalB = (parseInt(b.totalFin) || 0) + (parseInt(b.totalPos) || 0);
                    return totalB - totalA;
                });
                
                sortedTeams.forEach((t, i) => {
                    let overallTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let rowAnimClass = board.classList.contains('trigger-animate') ? 'trigger-card-animate' : '';
                    let rowDelay = rowAnimClass !== '' ? `style="animation-delay: ${(i * 0.04) + 0.2}s"` : '';

                    h += `<div class="team-row ${t.alive.every(a=>a==0)?'eliminated':''} ${rowAnimClass}" ${rowDelay}>
                        <div style="text-align:center;">${i+1}</div><div class="logo-col"><img src="${t.logo}"></div>
                        <div class="name-col">${t.name}</div>
                        <div class="status-col">${t.alive.map(a => `<div class="bar ${a?'':'dead'}"></div>`).join('')}</div>
                        <div style="text-align:center;">${t.fin || 0}</div>
                        <div class="total-box">${overallTotal}</div>
                    </div>`;
                });
                board.innerHTML = h;
            }
        }

        // AUTO REFRESH LOOP
        setInterval(() => {
            const board = document.getElementById('board');
            const pPanel = document.getElementById('prediction-panel');
            
            board.style.display = "none";
            pPanel.classList.remove('show');
            
            setTimeout(() => {
                if(cachedTeamsData.length > 0) {
                    shouldAnimateNextRender = true; 
                    render(cachedTeamsData);
                }
            }, 2500); 
        }, 30000);
    </script>
</body>
</html>
