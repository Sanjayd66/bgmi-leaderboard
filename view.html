<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --dark-blue: #12193b; --row-bg: #1a2245; --cyan: #00f2ff; --text-color: #ffffff; --elim-bg: #15191d; --pred-bg: #0b0e11; }
        body { font-family: 'Oswald', sans-serif; margin: 0; background: #00FF00; overflow: hidden; width: 1920px; height: 1080px; }
        
        /* BOARD MAIN CONTAINER */
        #board { 
            position: absolute; 
            right: 40px; 
            bottom: 40px; 
            background: var(--dark-blue); 
            padding: 8px; 
            border-radius: 4px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        /* ORIGINAL LAYOUT COLUMNS RETAINED */
        .header-row, .team-row { display: grid; grid-template-columns: 25px 30px 55px 35px 30px 30px; align-items: center; gap: 2px; color: var(--text-color); }
        .header-row { font-size: 10px; color: var(--cyan); border-bottom: 1px solid rgba(0,242,255,0.3); margin-bottom: 4px; text-align: center; }
        
        /* INDIVIDUAL TEAM ROWS */
        .team-row { 
            background: var(--row-bg); 
            height: 32px; 
            margin-bottom: 2px; 
        }
        
        .team-row.eliminated { opacity: 0.4; filter: grayscale(1); }
        .logo-col { width: 22px; height: 22px; background: transparent; border-radius: 2px; margin: auto; display: flex; align-items: center; justify-content: center; }
        .logo-col img { width: 100%; height: 100%; object-fit: contain; }
        .name-col { padding-left: 5px; font-weight: bold; font-size: 13px; overflow: hidden; white-space: nowrap; text-transform: uppercase; }
        .status-col { display: flex; gap: 3px; justify-content: start; padding-left: 5px; }
        .bar { width: 4px; height: 14px; background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }
        .bar.dead { background: #444; box-shadow: none; opacity: 0.3; }
        .total-box { background: var(--cyan); color: #000; height: 100%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        
        /* PREDICTION PANEL MAIN BG */
        #prediction-panel { 
            position: absolute; 
            bottom: 40px; 
            right: 40px; 
            display: none; 
            flex-direction: column; 
            gap: 10px; 
        }
        #prediction-panel.show { display: flex; }
        
        /* PREDICTION CARDS */
        .pred-card { 
            width: 300px; 
            background: var(--pred-bg) !important; 
            border-left: 5px solid var(--cyan); 
            padding: 12px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            color: white; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.4); 
        }
        
        /* CLASSES FOR TRIGGERING ANIMATION ONLY WHEN NEEDED */
        .trigger-animate {
            animation: slideUpFade 0.5s ease-out forwards;
        }
        .trigger-card-animate {
            animation: slideUpFade 0.4s ease-out forwards;
        }

        /* ==========================================================================
           EXACT PIXEL-PERFECT ELIMINATION POPUP STYLES 
           ========================================================================== */
        #elim-popup { 
            position: fixed; 
            top: -200px; 
            left: 50%; 
            transform: translateX(-50%) scale(0.9); 
            display: flex; 
            align-items: center;
            width: 720px; 
            height: 135px; 
            background: #171c21;
            border-radius: 20px; 
            border: 4px solid var(--cyan); 
            color: white; 
            opacity: 0;
            box-shadow: 0 0 0px rgba(0,242,255,0);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 0 15px;
            box-sizing: border-box;
        }
        
        #elim-popup.show { 
            top: 50px; 
            opacity: 1; 
            transform: translateX(-50%) scale(1);
            box-shadow: 0 20px 45px rgba(0,0,0,0.8), 0 0 35px rgba(0,242,255,0.4);
        }

        /* Circular Frame Box left corner */
        .pop-logo-container {
            width: 105px;
            height: 105px;
            background: #1c2229;
            border-radius: 50%;
            border: 3px solid #283038;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 5px;
            box-shadow: inset 0 5px 12px rgba(0,0,0,0.6);
        }
        #pop-logo {
            width: 70px;
            height: 70px;
            object-fit: contain;
        }

        /* Center Content text elements */
        .pop-details {
            flex: 1;
            padding-left: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        #pop-name {
            font-size: 42px;
            margin: 0;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 0.5px;
            color: var(--cyan);
            line-height: 1;
            margin-bottom: 2px;
        }
        .pop-status-text {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
            font-weight: 700;
            text-transform: uppercase;
            line-height: 1;
        }

        /* Exact Right Box Container layout */
        .pop-fin-box {
            width: 110px;
            height: 105px;
            background: #171c21;
            border-radius: 14px;
            border: 3px solid #283038;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-right: 5px;
        }
        #pop-fin {
            font-size: 52px;
            color: #ffffff;
            font-weight: 900;
            line-height: 1;
        }
        .pop-fin-label {
            color: var(--cyan);
            font-size: 13px;
            letter-spacing: 1px;
            font-weight: 700;
            margin-top: 1px;
            text-transform: uppercase;
        }

        /* Animate only targets on visibility trigger state */
        #elim-popup.show #pop-name, #elim-popup.show #pop-logo, #elim-popup.show #pop-fin {
            animation: popInText 0.4s 0.3s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }
        
        #pop-name, #pop-fin { opacity: 0; transform: scale(0.8); }
        #pop-logo { opacity: 0; transform: translateY(-10px); transition: all 0.3s; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popInText {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="elim-popup">
        <div class="pop-logo-container">
            <img id="pop-logo">
        </div>
        <div class="pop-details">
            <p id="pop-name"></p>
            <p class="pop-status-text">TEAM ELIMINATED</p>
        </div>
        <div class="pop-fin-box">
            <div id="pop-fin">0</div>
            <div class="pop-fin-label">FINISHES</div>
        </div>
    </div>

    <div id="prediction-panel"></div>
    <div id="board"></div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SYNC_PATH = 'TournamentData/LiveSession';

        let currentElimId = "";
        let cachedTeamsData = []; 
        let shouldAnimateNextRender = true;

        db.ref(SYNC_PATH).on('value', (snap) => {
            const data = snap.val(); if(!data) return;
            const cfg = data.config || {};
            Object.entries(cfg).forEach(([p,v]) => { document.documentElement.style.setProperty('--' + p, v); });
            
            if(data.lastEliminated && data.lastEliminated.id !== currentElimId) {
                currentElimId = data.lastEliminated.id;
                
                document.getElementById('pop-name').style.opacity = "0";
                document.getElementById('pop-fin').style.opacity = "0";
                document.getElementById('pop-logo').style.opacity = "0";

                document.getElementById('pop-logo').src = data.lastEliminated.logo;
                document.getElementById('pop-name').innerText = data.lastEliminated.name;
                document.getElementById('pop-fin').innerText = data.lastEliminated.finishes;
                
                const p = document.getElementById('elim-popup');
                p.classList.add('show'); 
                
                setTimeout(() => {
                    p.classList.remove('show');
                }, 4000);
            }
            
            cachedTeamsData = data.teams || [];
            render(cachedTeamsData);
        });

        function render(teams) {
            const board = document.getElementById('board');
            const pPanel = document.getElementById('prediction-panel');
            const alive = teams.filter(t => t.alive && t.alive.some(a => a === 1));

            board.classList.remove('trigger-animate');
            pPanel.classList.remove('trigger-animate');
            
            if (shouldAnimateNextRender) {
                void board.offsetWidth; 
                void pPanel.offsetWidth;
                board.classList.add('trigger-animate');
                pPanel.classList.add('trigger-animate');
                shouldAnimateNextRender = false; 
            }

            if (alive.length >= 2 && alive.length <= 5) {
                pPanel.classList.add('show'); board.style.display="none"; pPanel.innerHTML="";
                
                let totalS = alive.reduce((a,c) => {
                    let teamTotal = (parseInt(c.totalFin) || 0) + (parseInt(c.totalPos) || 0);
                    return a + (teamTotal + c.alive.filter(x=>x==1).length * 3);
                }, 0) || 1;
                
                alive.forEach((t, index) => {
                    let teamTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    let winPerc = Math.round((((teamTotal + t.alive.filter(x=>x==1).length * 3)/totalS)*100));
                    
                    let cardAnimClass = board.classList.contains('trigger-animate') ? 'trigger-card-animate' : '';
                    let cardDelay = cardAnimClass !== '' ? `style="animation-delay: ${(index * 0.05) + 0.2}s"` : '';
                    
                    pPanel.innerHTML += `<div class="pred-card ${cardAnimClass}" ${cardDelay}>
                        <img src="${t.logo}" style="width:35px; height:35px; background:transparent; object-fit:contain;">
                        <div style="flex:1;">
                            <div style="font-size:14px;">${t.name}</div>
                            <div style="font-size:10px; color:#aaa;">${teamTotal} TOTAL PTS</div>
                        </div>
                        <div style="color:var(--cyan); font-size:20px; font-weight:900;">${winPerc}%</div>
                    </div>`;
                });
            } else {
                pPanel.classList.remove('show'); board.style.display="block";
                let h = `<div class="header-row" style="background:none;"><div>#</div><div>LOGO</div><div style="text-align:left;">TEAM</div><div style="text-align:left; padding-left:5px;">STATUS</div><div>FIN.</div><div>TOTAL</div></div>`;
                
                const sortedTeams = [...teams].sort((a,b)=> {
                    let totalA = (parseInt(a.totalFin) || 0) + (parseInt(a.totalPos) || 0);
                    let totalB = (parseInt(b.totalFin) || 0) + (parseInt(b.totalPos) || 0);
                    return totalB - totalA;
                });
                
                sortedTeams.forEach((t, i) => {
                    let overallTotal = (parseInt(t.totalFin) || 0) + (parseInt(t.totalPos) || 0);
                    
                    let rowAnimClass = board.classList.contains('trigger-animate') ? 'trigger-card-animate' : '';
                    let rowDelay = rowAnimClass !== '' ? `style="animation-delay: ${(i * 0.04) + 0.2}s"` : '';

                    h += `<div class="team-row ${t.alive.every(a=>a==0)?'eliminated':''} ${rowAnimClass}" ${rowDelay}>
                        <div style="text-align:center;">${i+1}</div><div class="logo-col"><img src="${t.logo}"></div>
                        <div class="name-col">${t.name}</div>
                        <div class="status-col">${t.alive.map(a => `<div class="bar ${a?'':'dead'}"></div>`).join('')}</div>
                        <div style="text-align:center;">${t.fin || 0}</div>
                        <div class="total-box">${overallTotal}</div>
                    </div>`;
                });
                board.innerHTML = h;
            }
        }

        setInterval(() => {
            const board = document.getElementById('board');
            const pPanel = document.getElementById('prediction-panel');
            
            board.style.display = "none";
            pPanel.classList.remove('show');
            
            setTimeout(() => {
                if(cachedTeamsData.length > 0) {
                    shouldAnimateNextRender = true; 
                    render(cachedTeamsData);
                }
            }, 2500); 
        }, 30000);
    </script>
</body>
</html>
