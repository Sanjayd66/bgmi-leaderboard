<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BGMI Admin - Final Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --cyan: #00f2ff; }
        body { font-family: 'Oswald', sans-serif; background: #0b0e11; color: white; padding: 10px; }
        .admin-panel { background: #15191d; padding: 15px; border-radius: 12px; max-width: 900px; margin: auto; border: 1px solid #2d3439; }
        .grid-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #1c2227; padding: 10px; border-radius: 8px; margin-bottom: 15px; border-bottom: 2px solid var(--cyan); }
        .item { display: flex; align-items: center; justify-content: space-between; background: #252c33; padding: 5px 8px; border-radius: 6px; font-size: 11px; }
        .team-card { background: #1c2227; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #2d3439; position: relative; }
        input { background: #0b0e11; border: 1px solid #343a40; color: white; padding: 4px; border-radius: 4px; font-size: 14px; }
        .action-btn { padding: 10px; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h3 style="color:var(--cyan); text-align:center;">BGMI MASTER ADMIN</h3>
        <div class="grid-layout">
            <div class="item"><label>Theme</label><input type="color" id="cfg-cyan" oninput="updateCfg('cyan',this.value)"></div>
            <div class="item"><label>Board BG</label><input type="color" id="cfg-dark-blue" oninput="updateCfg('dark-blue',this.value)"></div>
            <div class="item"><label>Row BG</label><input type="color" id="cfg-row-bg" oninput="updateCfg('row-bg',this.value)"></div>
            <div class="item"><label>Text Color</label><input type="color" id="cfg-text-color" oninput="updateCfg('text-color',this.value)"></div>
            <div class="item"><label>Elim BG</label><input type="color" id="cfg-elim-bg" oninput="updateCfg('elim-bg',this.value)"></div>
            <div class="item"><label>Pred BG</label><input type="color" id="cfg-pred-bg" oninput="updateCfg('pred-bg',this.value)"></div>
        </div>
        <div style="display: flex; gap: 8px; margin-bottom: 15px;">
            <button class="action-btn" style="background:#2ed573; color:white; flex:1;" onclick="addTeam()">+ Add Team</button>
            <button class="action-btn" style="background:#ffa502; color:white; flex:1;" onclick="globalNewMatch()">NEW MATCH</button>
            <button class="action-btn" style="background:#ff4757; color:white; flex:1;" onclick="resetAll()">Reset All</button>
        </div>
        <div id="team-list"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let teams = []; let config = {};

        db.ref('liveData').on('value', (snap) => {
            if (snap.exists()) {
                const data = snap.val();
                teams = data.teams || []; config = data.config || {};
                draw();
            }
        });

        function sync(elimData = null) { 
            db.ref('liveData').set({ 
                teams, 
                config, 
                lastEliminated: elimData ? elimData : (teams.lastElim || "") 
            }); 
        }

        function updateCfg(p,v) { config[p]=v; sync(); }

        function draw() {
            const list = document.getElementById('team-list'); list.innerHTML = '';
            teams.forEach((t, i) => {
                list.innerHTML += `
                <div class="team-card">
                    <button style="position:absolute; right:10px; top:10px; color:red; background:none; border:none;" onclick="removeTeam(${i})">✖</button>
                    <div style="display:grid; grid-template-columns: 1.5fr 1fr 60px 60px; gap:8px;">
                        <input value="${t.name}" onchange="edit(${i},'name',this.value)">
                        <input value="${t.logo}" onchange="edit(${i},'logo',this.value)" placeholder="Logo URL">
                        <input type="number" value="${t.fin}" onchange="edit(${i},'fin',this.value)">
                        <div style="display:flex; gap:2px;">
                            ${t.alive.map((a,pi)=>`<button style="width:25px;height:25px;opacity:${a?1:0.2};background:var(--cyan);border:none;border-radius:3px;" onclick="tog(${i},${pi})"></button>`).join('')}
                        </div>
                    </div>
                </div>`;
            });
        }

        function edit(i,f,v) { teams[i][f]=v; sync(); }
        
        function tog(i,pi) {
            teams[i].alive[pi] = teams[i].alive[pi] ? 0 : 1;
            let elim = null;
            // Agar team puri out ho gayi
            if (teams[i].alive.every(a=>a==0) && !teams[i].elim) {
                teams[i].elim = true;
                elim = { 
                    id: Date.now().toString(), // Unique ID to force trigger
                    name: teams[i].name, 
                    logo: teams[i].logo, 
                    finishes: (parseInt(teams[i].fin)||0) 
                };
            } else if (teams[i].alive.some(a=>a==1)) { 
                teams[i].elim = false; 
            }
            sync(elim);
        }

        function addTeam() { teams.push({ name: "TEAM", logo: "", fin: 0, place: 0, alive: [1,1,1,1], elim: false }); sync(); }
        function globalNewMatch() { teams.forEach(t => { t.fin=0; t.alive=[1,1,1,1]; t.elim=false; }); sync(""); }
        function removeTeam(i) { if(confirm("Delete?")) { teams.splice(i, 1); sync(); } }
        function resetAll() { if(confirm("RESET?")) { teams=[]; config={}; sync(); }}
    </script>
</body>
</html>
