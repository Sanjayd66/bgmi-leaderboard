<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>indian</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --cyan: #00f2ff; }
        body { font-family: 'Oswald', sans-serif; background: #0b0e11; color: white; padding: 15px; }
        .admin-panel { background: #15191d; padding: 20px; border-radius: 12px; max-width: 1200px; margin: auto; border: 1px solid #2d3439; }
        
        .color-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; background: #1c2227; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        .color-item { display: flex; align-items: center; justify-content: space-between; background: #252c33; padding: 10px; border-radius: 6px; }
        .color-item span { font-size: 12px; font-weight: bold; color: #aaa; text-transform: uppercase; }
        
        input[type="color"] { border: none; width: 40px; height: 25px; cursor: pointer; background: none; padding: 0; }
        .btn { padding: 12px; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; text-transform: uppercase; transition: 0.3s; }
        
        /* NAVIGATION BOX SYSTEM */
        .tabs-container { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; background: #1c2227; padding: 10px; border-radius: 8px; border: 1px solid #2d3439; }
        .tab-btn { background: #252c33; color: #aaa; border: 1px solid #343a40; padding: 8px 16px; cursor: pointer; border-radius: 4px; font-weight: bold; font-family: 'Oswald', sans-serif; }
        .tab-btn:hover { border-color: var(--cyan); color: white; }

        .team-row { background: #1c2227; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #2d3439; display: grid; grid-template-columns: 1.2fr 1.2fr 75px 75px 75px 75px 100px 30px; gap: 10px; align-items: center; }
        input[type="text"], input[type="number"] { background: #0b0e11; border: 1px solid #343a40; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .status-dot { width: 22px; height: 22px; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
        .label-tag { font-size: 9px; color: #888; display: block; margin-bottom: 2px; text-transform: uppercase; }

        /* VIEW MODAL STYLES */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: #15191d; border: 2px solid var(--cyan); padding: 25px; border-radius: 12px; width: 85%; max-width: 900px; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 25px rgba(0,242,255,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .close-btn { font-size: 28px; font-weight: bold; color: #ff4757; cursor: pointer; background: none; border: none; }
        .pop-table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: left; }
        .pop-table th, .pop-table td { padding: 10px; border-bottom: 1px solid #2d3439; font-size: 14px; }
        .pop-table th { color: var(--cyan); text-transform: uppercase; font-size: 12px; }
        .pop-logo { width: 25px; height: 25px; object-fit: contain; vertical-align: middle; margin-right: 8px; }
    </style>
</head>
<body>
    <div id="admin-content" class="admin-panel" style="display:none;">
        <h2 style="text-align:center; color:var(--cyan); margin-top:0;">BGMI ADMIN - HISTORY POPUP EDITION</h2>
        
        <div class="color-grid">
            <div class="color-item"><span>Theme</span><input type="color" id="cfg-cyan" onchange="updateCfg('cyan',this.value)"></div>
            <div class="color-item"><span>Board BG</span><input type="color" id="cfg-dark-blue" onchange="updateCfg('dark-blue',this.value)"></div>
            <div class="color-item"><span>Row BG</span><input type="color" id="cfg-row-bg" onchange="updateCfg('row-bg',this.value)"></div>
            <div class="color-item"><span>Text</span><input type="color" id="cfg-text-color" onchange="updateCfg('text-color',this.value)"></div>
            <div class="color-item"><span>Elim BG</span><input type="color" id="cfg-elim-bg" onchange="updateCfg('elim-bg',this.value)"></div>
            <div class="color-item"><span>Pred BG</span><input type="color" id="cfg-pred-bg" onchange="updateCfg('pred-bg',this.value)"></div>
        </div>

        <div style="font-size: 11px; color: #888; margin-bottom: 6px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Click to view past match scores:</div>
        <div class="tabs-container" id="match-tabs"></div>

        <h3 id="current-match-title" style="color: var(--cyan); margin-bottom: 15px; text-transform: uppercase;">Chalu Match: Match1</h3>

        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="btn" style="background:#2ed573; color:white; flex: 1;" onclick="addTeam()">+ ADD TEAM</button>
            <button class="btn" style="background:#ffa502; color:white; flex: 2;" onclick="globalNewMatch()">+ CREATE NEW MATCH TAB</button>
            <button class="btn" style="background:#ff4757; color:white; flex: 1;" onclick="resetAll()">FULL RESET</button>
        </div>
        <div id="team-list"></div>
    </div>

    <div id="history-modal" class="modal" onclick="document.getElementById('history-modal').style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title" style="margin:0; color:var(--cyan); text-transform:uppercase;">Match Points</h3>
                <button class="close-btn" onclick="document.getElementById('history-modal').style.display='none'">✖</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        const pass = prompt("Sanjay Bhai, Password daalo:");
        if(pass === "BOT@97") {
            document.getElementById('admin-content').style.display = 'block';
        } else {
            document.body.innerHTML = "<h1 style='color:red; text-align:center;'>ACCESS DENIED</h1>";
            window.stop();
        }

        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SYNC_PATH = 'TournamentData/LiveSession';
        
        let allMatchesData = {};
        let currentMatchKey = "Match1"; 
        let config = {};

        // Listen for data
        db.ref(SYNC_PATH).on('value', (snap) => {
            const data = snap.val() || {};
            config = data.config || { 'cyan': '#00f2ff', 'dark-blue': '#12193b', 'row-bg': '#1a2245', 'text-color': '#ffffff', 'elim-bg': '#15191d', 'pred-bg': '#0b0e11' };
            
            currentMatchKey = data.activeMatchKey || "Match1";
            document.getElementById('current-match-title').innerText = `Chalu Match: ${currentMatchKey.replace("Match", "Match ")}`;

            allMatchesData = {};
            Object.keys(data).forEach(key => {
                if(key.startsWith("Match")) {
                    allMatchesData[key] = data[key];
                }
            });

            if(Object.keys(allMatchesData).length === 0) {
                allMatchesData["Match1"] = { teams: [] };
            }

            if(!allMatchesData[currentMatchKey]) {
                currentMatchKey = Object.keys(allMatchesData)[0];
            }

            Object.keys(config).forEach(k => {
                const el = document.getElementById('cfg-' + k);
                if(el) el.value = config[k];
            });
            
            document.documentElement.style.setProperty('--cyan', config.cyan);
            
            renderTabs();
            draw();
        });

        // Creates separate historical pop-up buttons for each match
        function renderTabs() {
            const container = document.getElementById('match-tabs');
            container.innerHTML = '';
            
            const sortedMatchKeys = Object.keys(allMatchesData).sort((a,b) => {
                return parseInt(a.replace("Match", "")) - parseInt(b.replace("Match", ""));
            });

            sortedMatchKeys.forEach(key => {
                const num = key.replace("Match", "");
                const btn = document.createElement('button');
                btn.className = "tab-btn";
                // Agar chalu match hai toh identify karne ke liye star laga diya
                btn.innerText = `MATCH ${num} ${currentMatchKey === key ? '★' : ''}`;
                btn.onclick = () => {
                    openMatchPopup(key); 
                };
                container.appendChild(btn);
            });
        }

        // Logic to show points inside the admin popup modal
        function openMatchPopup(matchKey) {
            const modal = document.getElementById('history-modal');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');
            
            title.innerText = `Points Table View - Match ${matchKey.replace("Match", "")}`;
            let matchTeams = allMatchesData[matchKey]?.teams || [];
            
            if(matchTeams.length === 0) {
                body.innerHTML = `<p style="color:#aaa; text-align:center; padding: 20px;">No data found in this match.</p>`;
            } else {
                let html = `<table class="pop-table">
                    <thead>
                        <tr>
                            <th>Team Name</th>
                            <th style="text-align:center;">Prev Kills</th>
                            <th style="text-align:center;">Match Kills</th>
                            <th style="text-align:center;">Prev Pos</th>
                            <th style="text-align:center;">Match Pos</th>
                            <th style="text-align:center; color:var(--cyan);">Total Pts</th>
                        </tr>
                    </thead>
                    <tbody>`;
                
                matchTeams.forEach((t) => {
                    let totalPts = (parseInt(t.prevFin)||0) + (parseInt(t.fin)||0) + (parseInt(t.prevPos)||0) + (parseInt(t.pos)||0);
                    let logoImg = t.logo ? `<img class="pop-logo" src="${t.logo}">` : '';
                    html += `<tr>
                        <td style="font-weight:bold; text-transform:uppercase;">${logoImg}${t.name || 'TEAM'}</td>
                        <td style="text-align:center;">${t.prevFin || 0}</td>
                        <td style="text-align:center;">${t.fin || 0}</td>
                        <td style="text-align:center;">${t.prevPos || 0}</td>
                        <td style="text-align:center;">${t.pos || 0}</td>
                        <td style="text-align:center; font-weight:900; color:var(--cyan);">${totalPts}</td>
                    </tr>`;
                });
                
                html += `</tbody></table>`;
                body.innerHTML = html;
            }
            modal.style.display = 'flex';
        }

        function updateCfg(param, value) {
            config[param] = value;
            if(param === 'cyan') document.documentElement.style.setProperty('--cyan', value);
            db.ref(SYNC_PATH + '/config').set(config);
        }

        function sync(elimData = null) { 
            let currentTeams = allMatchesData[currentMatchKey]?.teams || [];
            currentTeams.forEach(t => { 
                t.totalFin = (parseInt(t.prevFin) || 0) + (parseInt(t.fin) || 0); 
                t.totalPos = (parseInt(t.prevPos) || 0) + (parseInt(t.pos) || 0); 
            });
            
            let updates = {};
            updates[`/${currentMatchKey}/teams`] = currentTeams;
            if(elimData !== undefined) {
                updates[`/${currentMatchKey}/lastEliminated`] = elimData;
            }
            db.ref(SYNC_PATH).update(updates);
        }

        function draw() {
            const list = document.getElementById('team-list'); 
            list.innerHTML = '';
            let currentTeams = allMatchesData[currentMatchKey]?.teams || [];
            
            currentTeams.forEach((t, i) => {
                list.innerHTML += `<div class="team-row">
                    <div><span class="label-tag">Team</span><input type="text" value="${t.name || ''}" onchange="edit(${i},'name',this.value)"></div>
                    <div><span class="label-tag">Logo</span><input type="text" value="${t.logo || ''}" onchange="edit(${i},'logo',this.value)"></div>
                    <div><span class="label-tag">Prev Kills</span><input type="number" value="${t.prevFin || 0}" onchange="edit(${i},'prevFin',this.value)"></div>
                    <div><span class="label-tag">Match Kills</span><input type="number" value="${t.fin || 0}" onchange="edit(${i},'fin',this.value)"></div>
                    
                    <div><span class="label-tag">Prev Pos</span><input type="number" value="${t.prevPos || 0}" onchange="edit(${i},'prevPos',this.value)"></div>
                    <div><span class="label-tag">Match Pos</span><input type="number" value="${t.pos || 0}" onchange="edit(${i},'pos',this.value)"></div>
                    
                    <div><span class="label-tag">Status</span><div style="display:flex; gap:4px;">
                        ${t.alive.map((a,pi)=>`<button class="status-dot" style="background:${a?config.cyan:'#333'}" onclick="tog(${i},${pi})"></button>`).join('')}
                    </div></div>
                    <button style="color:red; background:none; border:none; cursor:pointer;" onclick="removeTeam(${i})">✖</button>
                </div>`;
            });
        }

        function edit(i,f,v) { 
            let currentTeams = allMatchesData[currentMatchKey]?.teams || [];
            if(f === 'prevFin' || f === 'fin' || f === 'prevPos' || f === 'pos') {
                currentTeams[i][f] = parseInt(v) || 0;
            } else {
                currentTeams[i][f] = v;
            }
            sync(allMatchesData[currentMatchKey]?.lastEliminated || null); 
        }
        
        function tog(i,pi) {
            let currentTeams = allMatchesData[currentMatchKey]?.teams || [];
            currentTeams[i].alive[pi] = currentTeams[i].alive[pi] ? 0 : 1;
            let elim = null;
            if (currentTeams[i].alive.every(a => a == 0)) {
                if (!currentTeams[i].elim) {
                    currentTeams[i].elim = true;
                    elim = { id: Date.now().toString(), name: currentTeams[i].name, logo: currentTeams[i].logo, finishes: (parseInt(currentTeams[i].fin)||0) };
                }
            } else {
                currentTeams[i].elim = false;
            }
            sync(elim);
        }

        function addTeam() { 
            if(!allMatchesData[currentMatchKey]) allMatchesData[currentMatchKey] = { teams: [] };
            if(!allMatchesData[currentMatchKey].teams) allMatchesData[currentMatchKey].teams = [];
            allMatchesData[currentMatchKey].teams.push({ name: "TEAM", logo: "", fin: 0, prevFin: 0, totalFin: 0, pos: 0, prevPos: 0, totalPos: 0, alive: [1,1,1,1], elim: false }); 
            sync(null); 
        }
        
        function globalNewMatch() { 
            const currentMatchNum = parseInt(currentMatchKey.replace("Match", ""));
            const nextMatchKey = "Match" + (currentMatchNum + 1);
            
            if(confirm(`Create New Tab: ${nextMatchKey}? Pichle match ke total points carry forward ho jayenge.`)) {
                let currentTeams = allMatchesData[currentMatchKey]?.teams || [];
                
                let nextTeams = currentTeams.map(t => {
                    let calculatedPrevFin = (parseInt(t.prevFin) || 0) + (parseInt(t.fin) || 0);
                    let calculatedPrevPos = (parseInt(t.prevPos) || 0) + (parseInt(t.pos) || 0);
                    return {
                        name: t.name,
                        logo: t.logo,
                        prevFin: calculatedPrevFin,
                        fin: 0,
                        totalFin: calculatedPrevFin,
                        prevPos: calculatedPrevPos,
                        pos: 0,
                        totalPos: calculatedPrevPos,
                        alive: [1,1,1,1],
                        elim: false
                    };
                });

                currentMatchKey = nextMatchKey;
                
                let updates = {};
                updates[`/${nextMatchKey}/teams`] = nextTeams;
                updates[`/${nextMatchKey}/lastEliminated`] = null;
                updates[`/activeMatchKey`] = nextMatchKey;

                db.ref(SYNC_PATH).update(updates);
            }
        }
        
        function removeTeam(i) { 
            let currentTeams = allMatchesData[currentMatchKey]?.teams || [];
            if(confirm("Delete Team?")) { 
                currentTeams.splice(i, 1); 
                sync(allMatchesData[currentMatchKey]?.lastEliminated || null); 
            } 
        }
        
        function resetAll() { if(confirm("HARD RESET Everything? All matches will be wiped.")) { db.ref(SYNC_PATH).set(null); currentMatchKey = "Match1"; } }
    </script>
</body>
</html>
