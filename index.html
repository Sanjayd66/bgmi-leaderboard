<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BGMI CLOUD ADMIN - Sync Enabled</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --cyan: #00f2ff; }
        body { font-family: 'Oswald', sans-serif; background: #0b0e11; color: white; padding: 15px; margin: 0; }
        .admin-panel { background: #15191d; padding: 15px; border-radius: 12px; max-width: 1000px; margin: 10px auto; border: 1px solid #2d3439; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; background: #1c2227; padding: 15px; border-radius: 8px; }
        .item { display: flex; align-items: center; justify-content: space-between; background: #252c33; padding: 8px; border-radius: 6px; font-size: 12px; }
        .main-btns { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .action-btn { flex: 1; min-width: 120px; padding: 12px; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; text-transform: uppercase; }
        .team-card { background: #1c2227; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #2d3439; display: grid; grid-template-columns: 1.5fr 1fr 60px 100px 40px; gap: 10px; align-items: center; }
        input { background: #0b0e11; border: 1px solid #343a40; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .status-btns { display: flex; gap: 4px; justify-content: center; }
        .status-dot { width: 22px; height: 22px; border: none; border-radius: 3px; cursor: pointer; }
        .del-btn { color: #ff4757; background: none; border: none; font-size: 22px; cursor: pointer; }
        @media (max-width: 600px) { .team-card { grid-template-columns: 1fr 1fr; } .status-btns { grid-column: span 2; } }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h2 style="color:var(--cyan); text-align:center; margin-top:0;">BGMI CLOUD ADMIN</h2>
        <div class="grid-layout">
            <div class="item"><label>Theme</label><input type="color" id="cfg-cyan" oninput="updateCfg('cyan',this.value)"></div>
            <div class="item"><label>Board BG</label><input type="color" id="cfg-dark-blue" oninput="updateCfg('dark-blue',this.value)"></div>
            <div class="item"><label>Text</label><input type="color" id="cfg-text-color" oninput="updateCfg('text-color',this.value)"></div>
        </div>
        <div class="main-btns">
            <button class="action-btn" style="background:#2ed573; color:white;" onclick="addTeam()">+ ADD TEAM</button>
            <button class="action-btn" style="background:#ffa502; color:white;" onclick="globalNewMatch()">NEW MATCH</button>
            <button class="action-btn" style="background:#ff4757; color:white;" onclick="resetAll()">RESET ALL</button>
        </div>
        <div id="team-list"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const DATA_PATH = 'TournamentData/Session1'; // Fixed path for all devices

        let teams = []; let config = {};

        db.ref(DATA_PATH).on('value', (snap) => {
            const data = snap.val() || {};
            teams = data.teams || []; 
            config = data.config || {};
            if(config.cyan) document.getElementById('cfg-cyan').value = config.cyan;
            draw();
        });

        function sync(elimData = null) { 
            db.ref(DATA_PATH).update({ 
                teams, 
                config, 
                lastEliminated: elimData ? elimData : (window.lastE || "") 
            }); 
        }

        function draw() {
            const list = document.getElementById('team-list'); list.innerHTML = '';
            teams.forEach((t, i) => {
                list.innerHTML += `<div class="team-card">
                    <input value="${t.name}" onchange="edit(${i},'name',this.value)">
                    <input value="${t.logo}" onchange="edit(${i},'logo',this.value)" placeholder="Logo URL">
                    <input type="number" value="${t.fin}" onchange="edit(${i},'fin',this.value)">
                    <div class="status-btns">${t.alive.map((a,pi)=>`<button class="status-dot" style="background:${a?config.cyan||'#00f2ff':'#333'}" onclick="tog(${i},${pi})"></button>`).join('')}</div>
                    <button class="del-btn" onclick="removeTeam(${i})">✖</button>
                </div>`;
            });
        }

        function edit(i,f,v) { teams[i][f]=v; sync(); }
        function updateCfg(p,v) { config[p]=v; sync(); }
        function tog(i,pi) {
            teams[i].alive[pi] = teams[i].alive[pi] ? 0 : 1;
            let elim = null;
            if (teams[i].alive.every(a=>a==0) && !teams[i].elim) {
                teams[i].elim = true;
                elim = { id: Date.now().toString(), name: teams[i].name, logo: teams[i].logo, finishes: t[i].fin };
                window.lastE = elim;
            } else if (teams[i].alive.some(a=>a==1)) { teams[i].elim = false; }
            sync(elim);
        }
        function addTeam() { teams.push({ name: "TEAM", logo: "", fin: 0, alive: [1,1,1,1], elim: false }); sync(); }
        function globalNewMatch() { teams.forEach(t => { t.fin=0; t.alive=[1,1,1,1]; t.elim=false; }); sync(""); }
        function removeTeam(i) { if(confirm("Delete?")) { teams.splice(i, 1); sync(); } }
        function resetAll() { if(confirm("Reset All?")) { db.ref(DATA_PATH).set(null); }}
    </script>
</body>
</html>
