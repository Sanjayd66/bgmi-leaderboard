<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BGMI Master Admin - All Features Restored</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --cyan: #00f2ff; }
        body { font-family: 'Oswald', sans-serif; background: #0b0e11; color: white; padding: 20px; }
        .admin-panel { background: #15191d; padding: 20px; border-radius: 12px; max-width: 1000px; margin: auto; border: 1px solid #2d3439; }
        
        /* Color Pickers Grid */
        .grid-layout { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; background: #1c2227; padding: 15px; border-radius: 8px; }
        .item { display: flex; align-items: center; justify-content: space-between; background: #252c33; padding: 10px; border-radius: 6px; }
        
        /* Main Controls */
        .main-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .action-btn { flex: 1; padding: 12px; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; text-transform: uppercase; }

        /* Team Row */
        .team-card { background: #1c2227; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #2d3439; display: grid; grid-template-columns: 1.5fr 1fr 60px 80px 100px 30px; gap: 15px; align-items: center; }
        input { background: #0b0e11; border: 1px solid #343a40; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        
        .status-btns { display: flex; gap: 4px; }
        .status-dot { width: 20px; height: 20px; border: none; border-radius: 3px; cursor: pointer; }
        .m-history { display: flex; gap: 5px; overflow-x: auto; padding: 5px; background: #0b0e11; border-radius: 4px; }
        .m-input { width: 40px !important; text-align: center; border: 1px solid var(--cyan) !important; }
        .del-btn { color: #ff4757; background: none; border: none; font-size: 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="admin-panel">
        <h2 style="color:var(--cyan); text-align:center; margin-bottom:20px;">BGMI MASTER ADMIN</h2>
        
        <div class="grid-layout">
            <div class="item"><label>Theme Color</label><input type="color" id="cfg-cyan" oninput="updateCfg('cyan',this.value)"></div>
            <div class="item"><label>Board BG</label><input type="color" id="cfg-dark-blue" oninput="updateCfg('dark-blue',this.value)"></div>
            <div class="item"><label>Row BG</label><input type="color" id="cfg-row-bg" oninput="updateCfg('row-bg',this.value)"></div>
            <div class="item"><label>Text Color</label><input type="color" id="cfg-text-color" oninput="updateCfg('text-color',this.value)"></div>
            <div class="item"><label>Elim BG</label><input type="color" id="cfg-elim-bg" oninput="updateCfg('elim-bg',this.value)"></div>
            <div class="item"><label>Pred BG</label><input type="color" id="cfg-pred-bg" oninput="updateCfg('pred-bg',this.value)"></div>
        </div>

        <div class="main-btns">
            <button class="action-btn" style="background:#2ed573; color:white;" onclick="addTeam()">+ ADD TEAM</button>
            <button class="action-btn" style="background:#ffa502; color:white;" onclick="globalNewMatch()">NEW MATCH (SAVE SCORE)</button>
            <button class="action-btn" style="background:#ff4757; color:white;" onclick="resetAll()">RESET ALL DATA</button>
        </div>

        <div id="team-list"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let teams = []; let config = {};

        db.ref('liveData').on('value', (snap) => {
            if (snap.exists()) {
                const data = snap.val();
                teams = data.teams || []; 
                config = data.config || {};
                
                // Sync Color Pickers
                const ids = ['cyan','dark-blue','row-bg','text-color','elim-bg','pred-bg'];
                ids.forEach(id => { if(config[id]) document.getElementById('cfg-'+id).value = config[id]; });
                
                draw();
            }
        });

        function sync(elimData = null) { 
            db.ref('liveData').set({ teams, config, lastEliminated: elimData ? elimData : (window.lastE || "") }); 
        }

        function updateCfg(p,v) { config[p]=v; sync(); }

        function draw() {
            const list = document.getElementById('team-list'); list.innerHTML = '';
            teams.forEach((t, i) => {
                let mPts = t.matches ? t.matches.reduce((a, b) => a + (parseInt(b) || 0), 0) : 0;
                let total = (parseInt(t.fin) || 0) + (parseInt(t.place) || 0) + mPts;
                
                list.innerHTML += `
                <div class="team-card">
                    <input value="${t.name}" onchange="edit(${i},'name',this.value)" placeholder="Team Name">
                    <input value="${t.logo}" onchange="edit(${i},'logo',this.value)" placeholder="Logo URL">
                    <input type="number" value="${t.fin}" onchange="edit(${i},'fin',this.value)" title="Finishes">
                    <div class="status-btns">
                        ${t.alive.map((a,pi)=>`<button class="status-dot" style="background:${a?config.cyan||'#00f2ff':'#333'}; opacity:${a?1:0.3};" onclick="tog(${i},${pi})"></button>`).join('')}
                    </div>
                    <div class="m-history">
                        ${(t.matches || []).map((m, mi) => `<input type="number" class="m-input" value="${m}" onchange="editMatch(${i},${mi},this.value)">`).join('')}
                    </div>
                    <button class="del-btn" onclick="removeTeam(${i})">✖</button>
                </div>`;
            });
        }

        function edit(i,f,v) { teams[i][f]=v; sync(); }
        function editMatch(ti,mi,v) { if(!teams[ti].matches) teams[ti].matches=[]; teams[ti].matches[mi]=parseInt(v)||0; sync(); }
        
        function tog(i,pi) {
            teams[i].alive[pi] = teams[i].alive[pi] ? 0 : 1;
            let elim = null;
            if (teams[i].alive.every(a=>a==0) && !teams[i].elim) {
                teams[i].elim = true;
                elim = { id: Date.now().toString(), name: teams[i].name, logo: teams[i].logo, finishes: (parseInt(teams[i].fin)||0) };
                window.lastE = elim;
            } else if (teams[i].alive.some(a=>a==1)) { teams[i].elim = false; }
            sync(elim);
        }

        function addTeam() { 
            let mCount = teams.length > 0 && teams[0].matches ? teams[0].matches.length : 0;
            teams.push({ name: "TEAM", logo: "", fin: 0, place: 0, alive: [1,1,1,1], elim: false, matches: new Array(mCount).fill(0) }); 
            sync(); 
        }

        function globalNewMatch() {
            teams.forEach(t => {
                let cur = (parseInt(t.fin)||0) + (parseInt(t.place)||0);
                if(!t.matches) t.matches = [];
                t.matches.push(cur);
                t.fin=0; t.place=0; t.alive=[1,1,1,1]; t.elim=false;
            });
            sync("");
        }

        function removeTeam(i) { if(confirm("Delete Team?")) { teams.splice(i, 1); sync(); } }
        function resetAll() { if(confirm("Reset EVERYTHING?")) { teams=[]; config={}; sync(); }}
    </script>
</body>
</html>
