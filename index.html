<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BGMI Broadcast Control Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #fff; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #ffc800; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .form-group { margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        label { font-weight: bold; font-size: 14px; }
        input[type="color"] { border: none; width: 50px; height: 35px; cursor: pointer; background: transparent; }
        input[type="text"], input[type="number"] { padding: 8px; border-radius: 4px; border: 1px solid #444; background: #2a2a2a; color: #fff; width: 60%; }
        button { background: #ffc800; color: #000; font-weight: bold; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #e0b000; }
        .btn-danger { background: #ff4757; color: #fff; }
        .btn-danger:hover { background: #d63031; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    </style>
</head>
<body>

    <div class="grid-2">
        <!-- COLOR CONFIGURATION PANEL -->
        <div class="card">
            <h2>🎨 Theme & Elimination Colors</h2>
            
            <div class="form-group">
                <label>Main Theme (Yellow Strip & #Rank):</label>
                <input type="color" id="themeColor" value="#ffc800">
            </div>

            <div class="form-group">
                <label>Elimination Top Color (Gradient):</label>
                <input type="color" id="elimTopColor" value="#e63900">
            </div>

            <div class="form-group">
                <label>Elimination Bottom Color (Gradient):</label>
                <input type="color" id="elimBottomColor" value="#7a1500">
            </div>

            <button onclick="saveColors()">Save Colors</button>
        </div>

        <!-- TRIGGER MANUAL ELIMINATION POPUP -->
        <div class="card">
            <h2>💥 Trigger Elimination Popup</h2>
            <div class="form-group">
                <label>Rank Position (#):</label>
                <input type="number" id="elimRank" value="7">
            </div>
            <div class="form-group">
                <label>Team Logo URL:</label>
                <input type="text" id="elimLogo" placeholder="https://link-to-logo.png">
            </div>
            <div class="form-group">
                <label>Finishes:</label>
                <input type="number" id="elimFinishes" value="4">
            </div>
            <div class="form-group">
                <label>Place Points:</label>
                <input type="number" id="elimPlacePts" value="1">
            </div>

            <button class="btn-danger" onclick="triggerElimination()">Show Popup On Stream</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://bgmi-overlay-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SYNC_PATH = 'TournamentData/LiveSession';

        // Load existing colors from Firebase
        db.ref(SYNC_PATH + '/config').on('value', (snap) => {
            const cfg = snap.val();
            if(cfg) {
                if(cfg['theme']) document.getElementById('themeColor').value = cfg['theme'];
                if(cfg['elim-bg-top']) document.getElementById('elimTopColor').value = cfg['elim-bg-top'];
                if(cfg['elim-bg-bottom']) document.getElementById('elimBottomColor').value = cfg['elim-bg-bottom'];
            }
        });

        // Save Color Configuration
        function saveColors() {
            const theme = document.getElementById('themeColor').value;
            const elimTop = document.getElementById('elimTopColor').value;
            const elimBottom = document.getElementById('elimBottomColor').value;

            db.ref(SYNC_PATH + '/config').update({
                'theme': theme,
                'elim-bg-top': elimTop,
                'elim-bg-bottom': elimBottom
            }).then(() => alert("Colors Updated Successfully!"));
        }

        // Trigger Elimination Banner Directly
        function triggerElimination() {
            const rank = document.getElementById('elimRank').value;
            const logo = document.getElementById('elimLogo').value;
            const finishes = document.getElementById('elimFinishes').value;
            const placePts = document.getElementById('elimPlacePts').value;

            db.ref(SYNC_PATH + '/lastEliminated').set({
                id: Date.now().toString(),
                rank: rank,
                logo: logo,
                finishes: finishes,
                placePts: placePts
            });
        }
    </script>
</body>
</html>
